name: CD

# Continuous Deployment for FuelGrid OS (CICD-4 / OPS-5).
#
# This workflow is intentionally a *safe no-op* until the deployment secrets
# are configured (see docs/deployment.md). The image builds + pushes to GHCR are
# always exercised (GHCR auth uses the automatic GITHUB_TOKEN), but the
# SSH-based droplet deploy and the post-deploy smoke jobs guard on optional
# secrets — they skip cleanly when those secrets are absent so the pipeline is
# valid before any real infrastructure exists.
#
# Target: a single DigitalOcean Droplet running `docker compose` with
# self-hosted Postgres + Redis behind a Caddy reverse proxy. Migrations run ON
# THE DROPLET inside the deploy (a dedicated migrate image carries the SQL +
# golang-migrate) — NOT from this runner, because the self-hosted Postgres is
# not publicly reachable.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

# Single-flight per ref: never let two deploys of the same ref race. We do NOT
# cancel in progress — a half-applied migration interrupted mid-flight is worse
# than waiting for the prior deploy to finish.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Required for docker/login-action to push to GHCR with GITHUB_TOKEN.
  packages: write

jobs:
  build-push:
    name: Build + push API image to GHCR
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR auth is automatic: GITHUB_TOKEN + packages:write is all that's
      # needed, no manually-created secret. Image repo is the lowercased
      # owner/repo with an -api suffix: ghcr.io/<owner>/<repo>-api.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}-api"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "Image repository: $image"

      # Tags:
      #   - :sha-<full-sha>   immutable handle for every build
      #   - :latest           moving handle, only on branch pushes (not tags)
      #   - :<tag>            the git tag name, on tag pushes (e.g. v1.2.3)
      - name: Docker metadata (tags + labels)
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build + push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}

  build-push-web:
    name: Build + push Web image to GHCR
    runs-on: ubuntu-latest
    environment: production
    # Independent of the API build (no `needs:`) so both tiers build in
    # parallel. Like build-push, this runs on every push to main / tag and uses
    # the automatic GITHUB_TOKEN for GHCR — no extra secret required.
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Web image repo is the lowercased owner/repo with a -web suffix:
      # ghcr.io/<owner>/<repo>-web. The droplet's .env (WEB_IMAGE) is set by the
      # deploy job to this same ref + :sha-<full-sha> tag to roll it out.
      - name: Compute image reference
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}-web"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "Image repository: $image"

      # Same tagging scheme as the API build so the rollout can pin :sha-<sha>:
      #   - :sha-<full-sha>   immutable handle for every build
      #   - :latest           moving handle, only on branch pushes (not tags)
      #   - :<tag>            the git tag name, on tag pushes (e.g. v1.2.3)
      - name: Docker metadata (tags + labels)
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      # Build context is the repo root (the web image needs the whole pnpm
      # workspace); the Dockerfile lives at apps/web/Dockerfile. Runtime config
      # (API_ORIGIN) is supplied by the compose `web` service at deploy time.
      - name: Build + push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-migrate:
    name: Build + push migrate image to GHCR
    runs-on: ubuntu-latest
    environment: production
    # Independent of the app builds (no `needs:`) so all three tiers build in
    # parallel. Carries golang-migrate + the SQL migrations baked in, so the
    # droplet (which has no repo checkout) can apply the schema as a one-shot.
    # Same automatic GITHUB_TOKEN GHCR auth — no extra secret.
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Migrate image repo is the lowercased owner/repo with a -migrate suffix:
      # ghcr.io/<owner>/<repo>-migrate. The deploy job sets MIGRATE_IMAGE to this
      # ref + :sha-<full-sha> and runs `docker compose run --rm migrate`.
      - name: Compute image reference
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}-migrate"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "Image repository: $image"

      - name: Docker metadata (tags + labels)
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      # Build context is the repo root so services/api/migrations is reachable;
      # the Dockerfile.migrate copies them into a migrate/migrate base image.
      - name: Build + push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile.migrate
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean droplet (SSH + docker compose)
    runs-on: ubuntu-latest
    # All three images must be published before the droplet pulls them: migrate
    # for the one-shot, api/web for `up -d`.
    needs: [build-push, build-push-web, build-push-migrate]
    environment: production
    steps:
      # Guard on DEPLOY_SSH_KEY exactly like the smoke (DEPLOY_HEALTH_URL) gate:
      # secrets can't be used in a job-level `if:`, so the gate lives in a first
      # step that exports a flag the rest of the job reads. When the SSH key is
      # unset (no droplet provisioned yet) the deploy is a clean no-op so the
      # pipeline stays lint-valid and green before any infra exists.
      - name: Check for DEPLOY_SSH_KEY secret
        id: gate
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_SSH_KEY is configured — droplet deploy will run."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_SSH_KEY secret is not set; skipping droplet deploy (no-op until the droplet is provisioned)."
          fi

      # SSH into the droplet and run the rollout: log into GHCR, pin the just-
      # built sha-<sha> image refs into the on-droplet .env (the compose file +
      # Caddyfile + .env already live there — placed once per the runbook), apply
      # migrations as a one-shot, then `up -d` and prune dangling images.
      #
      # The deploy user (DEPLOY_USER, default `deploy`) owns /opt/fuelgrid and can
      # run docker compose. GHCR_TOKEN falls back to GITHUB_TOKEN — note a repo
      # GITHUB_TOKEN is not valid off the runner, so set GHCR_PULL_TOKEN (a PAT or
      # the droplet's own login) when the package is private; for a public package
      # `docker compose pull` needs no auth at all.
      - name: Deploy over SSH (appleboy/ssh-action)
        if: steps.gate.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || 'deploy' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Fail the job (and the deploy) on any non-zero command.
          script_stop: true
          envs: GITHUB_REPOSITORY,GITHUB_SHA,GHCR_ACTOR,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/fuelgrid

            owner_repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
            api_image="ghcr.io/${owner_repo}-api:sha-${GITHUB_SHA}"
            web_image="ghcr.io/${owner_repo}-web:sha-${GITHUB_SHA}"
            migrate_image="ghcr.io/${owner_repo}-migrate:sha-${GITHUB_SHA}"

            # Authenticate to GHCR if a pull token was provided (private package).
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin
            fi

            # Pin the immutable image refs for this commit into the on-droplet
            # .env so `docker compose` interpolates them. Replace any prior lines.
            sed -i "\#^API_IMAGE=#d;\#^WEB_IMAGE=#d;\#^MIGRATE_IMAGE=#d" .env
            {
              echo "API_IMAGE=${api_image}"
              echo "WEB_IMAGE=${web_image}"
              echo "MIGRATE_IMAGE=${migrate_image}"
            } >> .env

            # Pull the freshly-built images.
            docker compose -f docker-compose.prod.yml pull api web migrate

            # Schema first: apply migrations as the OWNER (one-shot), then roll
            # out. golang-migrate `up` is idempotent (no pending = exit 0).
            docker compose -f docker-compose.prod.yml run --rm migrate

            # Roll out the app tiers + Caddy.
            docker compose -f docker-compose.prod.yml up -d

            # Reclaim disk from superseded image layers.
            docker image prune -f
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GHCR_ACTOR: ${{ github.actor }}
          # Optional: a PAT with read:packages if the GHCR package is private.
          # Leave unset for a public package (compose pull needs no auth).
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}

  smoke:
    name: Post-deploy smoke (/readyz must be 200)
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    steps:
      # Guard on DEPLOY_HEALTH_URL the same way as the deploy gate: skip cleanly
      # when the health URL secret is unset.
      - name: Check for DEPLOY_HEALTH_URL secret
        id: gate
        env:
          DEPLOY_HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}
        run: |
          if [ -n "$DEPLOY_HEALTH_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_HEALTH_URL is configured — smoke gate will run."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HEALTH_URL secret is not set; skipping smoke gate (no-op until infra exists)."
          fi

      # Poll /readyz: the deployed API reports 200 + {"status":"ready"} only
      # when its postgres and redis checks pass. Anything else fails the deploy.
      - name: Probe deployed /readyz
        if: steps.gate.outputs.configured == 'true'
        env:
          DEPLOY_HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}
        run: |
          echo "Probing $DEPLOY_HEALTH_URL"
          status=0
          for i in $(seq 1 30); do
            status=$(curl -sS -o /tmp/readyz.json -w '%{http_code}' --max-time 10 "$DEPLOY_HEALTH_URL" || echo 000)
            if [ "$status" = "200" ]; then
              echo "readyz returned 200 on attempt $i"
              cat /tmp/readyz.json
              break
            fi
            echo "attempt $i: status=$status, retrying in 5s..."
            sleep 5
          done
          if [ "$status" != "200" ]; then
            echo "::error::Post-deploy smoke gate failed: /readyz returned $status (expected 200)"
            cat /tmp/readyz.json 2>/dev/null || true
            exit 1
          fi
          grep -q '"status":"ready"' /tmp/readyz.json
          echo "Post-deploy smoke gate passed."
