name: E2E

# Playwright auth-flow smoke (QA-7 / CICD-3). Runs the web app's production
# build under a real headless Chromium, with the BACKEND fully mocked via
# Playwright route interception (no Postgres/Redis/API needed). Kept in its own
# workflow so it does not gate — or slow — the existing CI `node` job.

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'docs/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: Playwright — web auth smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (+ system deps)
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      # The Playwright config's webServer builds (pnpm build) and starts
      # (next start) the app, then the specs drive it. CI=true is set by GitHub
      # Actions, which flips the config to the CI reporter and disables server
      # reuse.
      - name: Run e2e specs
        run: pnpm -C apps/web exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
