name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  node:
    name: Node — lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  go:
    name: Go — vet, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1

      - name: Test (with race detector)
        run: go test -race -count=1 ./...

      - name: Build
        run: go build ./...

  migrations:
    name: Migrations — apply, seed, /readyz check
    runs-on: ubuntu-latest
    needs: go
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fuelgrid
          POSTGRES_PASSWORD: fuelgrid
          POSTGRES_DB: fuelgrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fuelgrid -d fuelgrid"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://fuelgrid:fuelgrid@localhost:5432/fuelgrid?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply migrations
        run: go run ./services/api/cmd/migrate up

      - name: Verify current version
        run: go run ./services/api/cmd/migrate version

      - name: Roll back to zero
        run: go run ./services/api/cmd/migrate down-all

      - name: Re-apply migrations
        run: go run ./services/api/cmd/migrate up

      - name: Seed demo data
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
        run: go run ./services/api/cmd/seed

      - name: Build api binary
        run: go build -o /tmp/api ./services/api/cmd/api

      - name: Boot api and probe /readyz
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
        run: |
          /tmp/api &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          trap "kill $API_PID 2>/dev/null || true" EXIT

          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then
              echo "API is up"
              break
            fi
            sleep 0.5
          done

          # /readyz must report 200 with both postgres and redis checks ok.
          body=$(curl -sS http://127.0.0.1:8080/readyz)
          echo "readyz: $body"
          echo "$body" | grep -q '"postgres":"ok"'
          echo "$body" | grep -q '"redis":"ok"'

          # Keep the API running for the next step. (trap on the same shell
          # would kill it before we reach login. Persist the PID instead.)
          disown

      - name: Auth smoke — login, hit /me, logout
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
        run: |
          # Re-boot a fresh API for this step in its own subshell so
          # /me lifecycle is clean.
          pkill -f /tmp/api || true
          /tmp/api &
          API_PID=$!
          trap "kill $API_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then break; fi
            sleep 0.5
          done

          login=$(curl -sS -X POST http://127.0.0.1:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"tenant_slug":"demo","email":"demo@fuelgrid.local","password":"fuelgrid-demo-password-1234"}')
          echo "login: $login"

          token=$(echo "$login" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          if [ -z "$token" ]; then
            echo "no token in login response"; exit 1
          fi

          me=$(curl -sS http://127.0.0.1:8080/api/v1/me -H "Authorization: Bearer $token")
          echo "me: $me"
          echo "$me" | grep -q '"user_id"'
          echo "$me" | grep -q '"tenant_id"'

          # /me/permissions: demo user is station_manager scoped to MIK-01.
          perms=$(curl -sS http://127.0.0.1:8080/api/v1/me/permissions -H "Authorization: Bearer $token")
          echo "permissions: $perms"
          echo "$perms" | grep -q '"station.read"'
          echo "$perms" | grep -q '"reports.export"'
          echo "$perms" | grep -q '"tenant_wide":false'
          # attendant-only permissions must not appear (attendant role has only shift.open)
          if echo "$perms" | grep -q '"users.assign_roles"'; then
            echo "station_manager unexpectedly has users.assign_roles"; exit 1
          fi

          # Look up the two seeded station ids by code.
          mik_id=$(PGPASSWORD=fuelgrid psql -At -h 127.0.0.1 -U fuelgrid -d fuelgrid \
            -c "SELECT id FROM stations WHERE code='MIK-01'")
          msa_id=$(PGPASSWORD=fuelgrid psql -At -h 127.0.0.1 -U fuelgrid -d fuelgrid \
            -c "SELECT id FROM stations WHERE code='MSA-01'")
          echo "MIK-01=$mik_id MSA-01=$msa_id"
          if [ -z "$mik_id" ] || [ -z "$msa_id" ]; then
            echo "missing seeded station ids"; exit 1
          fi

          # station_manager + user_station_access(MIK-01): allowed.
          status=$(curl -sS -o /tmp/mik.json -w '%{http_code}' \
            http://127.0.0.1:8080/api/v1/stations/$mik_id \
            -H "Authorization: Bearer $token")
          if [ "$status" != "200" ]; then
            echo "GET stations/MIK-01 returned $status, expected 200"
            cat /tmp/mik.json; exit 1
          fi
          grep -q '"code":"MIK-01"' /tmp/mik.json

          # Same role, no user_station_access for MSA-01: forbidden.
          status=$(curl -sS -o /tmp/msa.json -w '%{http_code}' \
            http://127.0.0.1:8080/api/v1/stations/$msa_id \
            -H "Authorization: Bearer $token")
          if [ "$status" != "403" ]; then
            echo "GET stations/MSA-01 returned $status, expected 403"
            cat /tmp/msa.json; exit 1
          fi

          # Logout returns 204
          status=$(curl -sS -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8080/api/v1/auth/logout \
            -H "Authorization: Bearer $token")
          if [ "$status" != "204" ]; then
            echo "logout returned $status, expected 204"; exit 1
          fi

          # After logout the token must no longer authenticate
          status=$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/api/v1/me \
            -H "Authorization: Bearer $token")
          if [ "$status" != "401" ]; then
            echo "post-logout /me returned $status, expected 401"; exit 1
          fi

      - name: Verify seeded rows
        run: |
          docker run --rm --network host postgres:16-alpine \
            psql "$DATABASE_URL" -c "
              SELECT (SELECT count(*) FROM tenants WHERE slug='demo')     AS tenants,
                     (SELECT count(*) FROM companies)                     AS companies,
                     (SELECT count(*) FROM regions)                       AS regions,
                     (SELECT count(*) FROM stations)                      AS stations,
                     (SELECT count(*) FROM users WHERE password_hash IS NOT NULL) AS users_with_password;
            "

  docker:
    name: Docker — build api image
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          load: true
          tags: fuelgrid-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}

      - name: Smoke test the image
        run: |
          docker run --rm -d --name api -p 8080:8080 fuelgrid-api:ci
          # Give the server a moment to bind.
          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then
              echo "API is up"
              break
            fi
            sleep 0.5
          done
          curl -sS http://127.0.0.1:8080/healthz | tee /tmp/healthz.json
          grep -q '"status":"ok"' /tmp/healthz.json
          curl -sS http://127.0.0.1:8080/readyz | tee /tmp/readyz.json
          grep -q '"status":"ready"' /tmp/readyz.json
          docker stop api
