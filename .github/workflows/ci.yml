name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'docs/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  node:
    name: Node â€” lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  openapi:
    name: OpenAPI â€” lint spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Lint docs/openapi.yaml
        run: npx --yes @redocly/cli@latest lint docs/openapi.yaml

  go:
    name: Go â€” vet, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Lint
        # golangci-lint v2 (see .golangci.yml `version: '2'`) requires
        # golangci-lint-action v7; v6 fails to install it ("v2 is not
        # supported"), which failed the whole `go` job and skipped `migrations`
        # (needs: go) â€” so the integration suite never ran. `latest` is required
        # because golangci-lint refuses to lint when it was built with an older
        # Go than the targeted version (go.mod is go 1.25), and the pinned
        # v2.1.x was built with go1.24.
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Test (with race detector)
        # CONTRACT_STRICT flips the routeâ†”OpenAPI contract test
        # (services/api/internal/server) from skip to enforce: any
        # registered route missing from docs/openapi.yaml fails CI.
        env:
          CONTRACT_STRICT: '1'
        run: go test -race -count=1 ./...

      - name: Build
        run: go build ./...

  migrations:
    name: Migrations â€” apply, seed, /readyz check
    runs-on: ubuntu-latest
    needs: go
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fuelgrid
          POSTGRES_PASSWORD: fuelgrid
          POSTGRES_DB: fuelgrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fuelgrid -d fuelgrid"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://fuelgrid:fuelgrid@localhost:5432/fuelgrid?sslmode=disable
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply migrations
        run: go run ./services/api/cmd/migrate up

      - name: Verify current version
        run: go run ./services/api/cmd/migrate version

      - name: Roll back to zero
        env:
          MIGRATE_CONFIRM: '1'
        run: go run ./services/api/cmd/migrate down-all

      - name: Re-apply migrations
        run: go run ./services/api/cmd/migrate up

      - name: Seed demo data
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
        run: go run ./services/api/cmd/seed

      - name: Build api binary
        run: go build -o /tmp/api ./services/api/cmd/api

      - name: Boot api and probe /readyz
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
        run: |
          /tmp/api &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          trap "kill $API_PID 2>/dev/null || true" EXIT

          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then
              echo "API is up"
              break
            fi
            sleep 0.5
          done

          # /readyz must report 200 with both postgres and redis checks ok.
          body=$(curl -sS http://127.0.0.1:8080/readyz)
          echo "readyz: $body"
          echo "$body" | grep -q '"postgres":"ok"'
          echo "$body" | grep -q '"redis":"ok"'

          # /metrics must serve Prometheus-format exposition with our
          # standard collectors registered.
          metrics=$(curl -sS http://127.0.0.1:8080/metrics)
          echo "$metrics" | head -20
          echo "$metrics" | grep -q '^fuelgrid_http_requests_total'
          echo "$metrics" | grep -q '^fuelgrid_outbox_unpublished_events'
          echo "$metrics" | grep -q '^fuelgrid_outbox_oldest_unpublished_age_seconds'

          # Keep the API running for the next step. (trap on the same shell
          # would kill it before we reach login. Persist the PID instead.)
          disown

      - name: Auth smoke â€” login, hit /me, logout
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
        run: |
          # Re-boot a fresh API for this step in its own subshell so
          # /me lifecycle is clean.
          pkill -f /tmp/api || true
          /tmp/api &
          API_PID=$!
          trap "kill $API_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then break; fi
            sleep 0.5
          done

          login=$(curl -sS -X POST http://127.0.0.1:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"tenant_slug":"demo","email":"demo@fuelgrid.local","password":"fuelgrid-demo-password-1234"}')
          echo "login: $login"

          token=$(echo "$login" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          if [ -z "$token" ]; then
            echo "no token in login response"; exit 1
          fi

          me=$(curl -sS http://127.0.0.1:8080/api/v1/me -H "Authorization: Bearer $token")
          echo "me: $me"
          echo "$me" | grep -q '"user_id"'
          echo "$me" | grep -q '"tenant_id"'

          # /me/permissions: demo user is station_manager scoped to MIK-01.
          perms=$(curl -sS http://127.0.0.1:8080/api/v1/me/permissions -H "Authorization: Bearer $token")
          echo "permissions: $perms"
          echo "$perms" | grep -q '"station.read"'
          echo "$perms" | grep -q '"reports.export"'
          echo "$perms" | grep -q '"tenant_wide":false'
          # attendant-only permissions must not appear (attendant role has only shift.open)
          if echo "$perms" | grep -q '"users.assign_roles"'; then
            echo "station_manager unexpectedly has users.assign_roles"; exit 1
          fi

          # Look up the two seeded station ids by code.
          mik_id=$(PGPASSWORD=fuelgrid psql -At -h 127.0.0.1 -U fuelgrid -d fuelgrid \
            -c "SELECT id FROM stations WHERE code='MIK-01'")
          msa_id=$(PGPASSWORD=fuelgrid psql -At -h 127.0.0.1 -U fuelgrid -d fuelgrid \
            -c "SELECT id FROM stations WHERE code='MSA-01'")
          echo "MIK-01=$mik_id MSA-01=$msa_id"
          if [ -z "$mik_id" ] || [ -z "$msa_id" ]; then
            echo "missing seeded station ids"; exit 1
          fi

          # station_manager + user_station_access(MIK-01): allowed.
          status=$(curl -sS -o /tmp/mik.json -w '%{http_code}' \
            http://127.0.0.1:8080/api/v1/stations/$mik_id \
            -H "Authorization: Bearer $token")
          if [ "$status" != "200" ]; then
            echo "GET stations/MIK-01 returned $status, expected 200"
            cat /tmp/mik.json; exit 1
          fi
          grep -q '"code":"MIK-01"' /tmp/mik.json

          # Same role, no user_station_access for MSA-01: forbidden.
          status=$(curl -sS -o /tmp/msa.json -w '%{http_code}' \
            http://127.0.0.1:8080/api/v1/stations/$msa_id \
            -H "Authorization: Bearer $token")
          if [ "$status" != "403" ]; then
            echo "GET stations/MSA-01 returned $status, expected 403"
            cat /tmp/msa.json; exit 1
          fi

          # Session revocation must be authoritative: revoking the
          # current session by id (the profile "log out this device"
          # path, which only touches Postgres + Redis-by-id) must stop
          # the token from authenticating immediately, not on TTL lapse.
          sess_id=$(curl -sS http://127.0.0.1:8080/api/v1/me/sessions \
            -H "Authorization: Bearer $token" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["items"][0]["id"])')
          echo "current session: $sess_id"
          status=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE \
            "http://127.0.0.1:8080/api/v1/me/sessions/$sess_id" \
            -H "Authorization: Bearer $token")
          if [ "$status" != "204" ]; then
            echo "revoke session returned $status, expected 204"; exit 1
          fi
          status=$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/api/v1/me \
            -H "Authorization: Bearer $token")
          if [ "$status" != "401" ]; then
            echo "post-revoke /me returned $status, expected 401 (revocation not authoritative!)"; exit 1
          fi
          echo "session revocation is authoritative"

          # Fresh login for the logout assertion below.
          token=$(curl -sS -X POST http://127.0.0.1:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"tenant_slug":"demo","email":"demo@fuelgrid.local","password":"fuelgrid-demo-password-1234"}' \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')

          # Logout returns 204
          status=$(curl -sS -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8080/api/v1/auth/logout \
            -H "Authorization: Bearer $token")
          if [ "$status" != "204" ]; then
            echo "logout returned $status, expected 204"; exit 1
          fi

          # After logout the token must no longer authenticate
          status=$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/api/v1/me \
            -H "Authorization: Bearer $token")
          if [ "$status" != "401" ]; then
            echo "post-logout /me returned $status, expected 401"; exit 1
          fi

          # Auth events must now land in audit_logs + outbox_events, not
          # just slog (audit #4). The flow above logged in twice, revoked
          # a session, and logged out.
          export PGPASSWORD=fuelgrid
          PSQL="psql -At -h 127.0.0.1 -U fuelgrid -d fuelgrid"
          logged_in=$($PSQL -c "SELECT count(*) FROM audit_logs WHERE action='user.logged_in'")
          logged_out=$($PSQL -c "SELECT count(*) FROM audit_logs WHERE action='user.logged_out'")
          revoked=$($PSQL -c "SELECT count(*) FROM audit_logs WHERE action='user.session_revoked'")
          outbox_login=$($PSQL -c "SELECT count(*) FROM outbox_events WHERE event_type='UserLoggedIn'")
          echo "audit: logged_in=$logged_in logged_out=$logged_out revoked=$revoked outbox_login=$outbox_login"
          if [ "$logged_in" -lt 2 ] || [ "$logged_out" -lt 1 ] || [ "$revoked" -lt 1 ] || [ "$outbox_login" -lt 2 ]; then
            echo "auth events did not produce the expected audit_logs / outbox_events rows"; exit 1
          fi
          echo "auth events are audited + emit outbox events"

      - name: Tenant isolation â€” seed a second tenant and verify both layers
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
        run: |
          # The auth-smoke step left a running API. Re-boot a clean instance
          # so this step is independent.
          pkill -f /tmp/api || true
          /tmp/api &
          API_PID=$!
          trap "kill $API_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then break; fi
            sleep 0.5
          done

          export PGPASSWORD=fuelgrid
          PSQL="psql -At -h 127.0.0.1 -U fuelgrid -d fuelgrid"

          # Create a second tenant + company + station + user as the
          # superuser. RLS is enabled but not forced, so the superuser
          # bypasses it.
          $PSQL <<'SQL'
            INSERT INTO tenants (id, name, slug)
            VALUES ('22222222-2222-2222-2222-222222222222', 'Other Co.', 'other');

            INSERT INTO companies (id, tenant_id, name)
            VALUES ('33333333-3333-3333-3333-333333333333',
                    '22222222-2222-2222-2222-222222222222',
                    'Other Petroleum Ltd');

            INSERT INTO stations (id, tenant_id, company_id, name, code, country)
            VALUES ('44444444-4444-4444-4444-444444444444',
                    '22222222-2222-2222-2222-222222222222',
                    '33333333-3333-3333-3333-333333333333',
                    'Other Station 1', 'OTH-01', 'Tanzania');
          SQL

          demo_tenant_id=$($PSQL -c "SELECT id FROM tenants WHERE slug='demo'")
          other_tenant_id="22222222-2222-2222-2222-222222222222"
          other_station_id="44444444-4444-4444-4444-444444444444"

          # ----- DB-layer cross-tenant FK rejection (audit #2) -----
          # A region in the demo tenant pointing at the OTHER tenant's
          # company must be rejected by the composite FK from 0008.
          # `set ON_ERROR_STOP off` so psql returns 0; we assert the
          # statement itself failed.
          rej=$(PGPASSWORD=fuelgrid psql -At -h 127.0.0.1 -U fuelgrid -d fuelgrid -v ON_ERROR_STOP=0 -c "
            INSERT INTO regions (tenant_id, company_id, name)
            VALUES ('$demo_tenant_id', '33333333-3333-3333-3333-333333333333', 'Cross-tenant region');
          " 2>&1 || true)
          echo "cross-tenant insert result: $rej"
          if ! echo "$rej" | grep -qi "violates foreign key constraint"; then
            echo "expected the cross-tenant region insert to be rejected by a FK"; exit 1
          fi
          echo "DB rejects cross-tenant hierarchy links"

          # ----- App-layer isolation -----
          # Log in as the demo tenant's user, request the OTHER tenant's
          # station by id. The app-layer WHERE tenant_id = ? filter must
          # cause this to look like a missing row -> 404.
          login=$(curl -sS -X POST http://127.0.0.1:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"tenant_slug":"demo","email":"demo@fuelgrid.local","password":"fuelgrid-demo-password-1234"}')
          token=$(echo "$login" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')

          status=$(curl -sS -o /tmp/other.json -w '%{http_code}' \
            http://127.0.0.1:8080/api/v1/stations/$other_station_id \
            -H "Authorization: Bearer $token")
          if [ "$status" != "404" ]; then
            echo "cross-tenant GET stations/$other_station_id returned $status, expected 404"
            cat /tmp/other.json
            exit 1
          fi
          echo "app layer: cross-tenant station lookup correctly returns 404"

          # ----- DB-layer isolation (RLS via fuelgrid_app role) -----
          APP_PSQL="psql -At -h 127.0.0.1 -U fuelgrid_app -d fuelgrid"

          # Demo tenant context: should see 2 stations (MIK-01, MSA-01).
          count=$(PGPASSWORD=fuelgrid_app $APP_PSQL -c "
            BEGIN;
            SET LOCAL app.current_tenant = '$demo_tenant_id';
            SELECT count(*) FROM stations;
            COMMIT;
          " | grep -E '^[0-9]+$')
          if [ "$count" != "2" ]; then
            echo "fuelgrid_app + demo tenant context: expected 2 stations, got $count"
            exit 1
          fi
          echo "RLS: demo tenant context sees 2 stations"

          # Other tenant context: should see 1 station (OTH-01).
          count=$(PGPASSWORD=fuelgrid_app $APP_PSQL -c "
            BEGIN;
            SET LOCAL app.current_tenant = '$other_tenant_id';
            SELECT count(*) FROM stations;
            COMMIT;
          " | grep -E '^[0-9]+$')
          if [ "$count" != "1" ]; then
            echo "fuelgrid_app + other tenant context: expected 1 station, got $count"
            exit 1
          fi
          echo "RLS: other tenant context sees 1 station"

          # No tenant context set: RLS must fail closed -> 0 rows.
          count=$(PGPASSWORD=fuelgrid_app $APP_PSQL -c "SELECT count(*) FROM stations" | grep -E '^[0-9]+$')
          if [ "$count" != "0" ]; then
            echo "fuelgrid_app with no tenant context: expected 0 stations, got $count"
            exit 1
          fi
          echo "RLS: no tenant context -> 0 stations (fail-closed)"

          # Random non-existent tenant: also 0.
          count=$(PGPASSWORD=fuelgrid_app $APP_PSQL -c "
            BEGIN;
            SET LOCAL app.current_tenant = '99999999-9999-9999-9999-999999999999';
            SELECT count(*) FROM stations;
            COMMIT;
          " | grep -E '^[0-9]+$')
          if [ "$count" != "0" ]; then
            echo "fuelgrid_app + nonexistent tenant: expected 0 stations, got $count"
            exit 1
          fi
          echo "RLS: nonexistent tenant -> 0 stations"

      - name: Audit + outbox â€” grant role writes audit_logs + outbox_events
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
          OUTBOX_POLL_INTERVAL: 500ms
        run: |
          pkill -f /tmp/api || true
          /tmp/api &
          API_PID=$!
          trap "kill $API_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then break; fi
            sleep 0.5
          done

          export PGPASSWORD=fuelgrid
          PSQL="psql -At -h 127.0.0.1 -U fuelgrid -d fuelgrid"

          # Login as the seeded admin user (system_admin role).
          admin_login=$(curl -sS -X POST http://127.0.0.1:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"tenant_slug":"demo","email":"admin@fuelgrid.local","password":"fuelgrid-admin-password-1234"}')
          admin_token=$(echo "$admin_login" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          if [ -z "$admin_token" ]; then
            echo "admin login failed: $admin_login"; exit 1
          fi

          # Look up the demo (non-admin) user id.
          demo_user_id=$($PSQL -c "SELECT id FROM users WHERE email='demo@fuelgrid.local'")

          # Snapshot row counts before the grant.
          audit_before=$($PSQL -c "SELECT count(*) FROM audit_logs WHERE action='user.role.granted'")
          outbox_before=$($PSQL -c "SELECT count(*) FROM outbox_events WHERE event_type='UserRoleGranted'")

          # Grant the 'attendant' role to the demo user.
          status=$(curl -sS -o /tmp/grant.json -w '%{http_code}' \
            -X POST http://127.0.0.1:8080/api/v1/admin/users/$demo_user_id/roles \
            -H "Authorization: Bearer $admin_token" \
            -H 'Content-Type: application/json' \
            -d '{"role_code":"attendant"}')
          if [ "$status" != "201" ]; then
            echo "grant role returned $status, expected 201"
            cat /tmp/grant.json; exit 1
          fi

          # Same tx wrote audit_logs and outbox_events. published_at may
          # already be NOT NULL if the publisher's tick beat us here.
          audit_after=$($PSQL -c "SELECT count(*) FROM audit_logs WHERE action='user.role.granted'")
          outbox_after=$($PSQL -c "SELECT count(*) FROM outbox_events WHERE event_type='UserRoleGranted'")
          if [ "$audit_after" != "$((audit_before + 1))" ]; then
            echo "audit_logs delta expected 1, got $((audit_after - audit_before))"
            exit 1
          fi
          if [ "$outbox_after" != "$((outbox_before + 1))" ]; then
            echo "outbox_events delta expected 1, got $((outbox_after - outbox_before))"
            exit 1
          fi
          echo "tx wrote +1 audit_logs and +1 outbox_events"

          # Wait for the publisher to dispatch (poll interval is 500ms).
          for i in $(seq 1 10); do
            published=$($PSQL -c "SELECT count(*) FROM outbox_events WHERE event_type='UserRoleGranted' AND published_at IS NOT NULL")
            if [ "$published" -ge "$outbox_after" ]; then
              echo "publisher dispatched the event after ~$((i * 500))ms"
              break
            fi
            sleep 0.5
          done

          published=$($PSQL -c "SELECT count(*) FROM outbox_events WHERE event_type='UserRoleGranted' AND published_at IS NOT NULL")
          if [ "$published" != "$outbox_after" ]; then
            echo "publisher did not mark events published: $published of $outbox_after"
            exit 1
          fi

          # Auditor read: the same admin token has audit.read (system_admin).
          logs=$(curl -sS -H "Authorization: Bearer $admin_token" \
            'http://127.0.0.1:8080/api/v1/audit-logs?action=user.role.granted')
          echo "audit-logs: $logs"
          echo "$logs" | grep -q '"action":"user.role.granted"'

      - name: Platform provisioning â€” create a tenant end-to-end (audit #5)
        env:
          AUTH_PASSWORD_PEPPER: ci-test-pepper
          PLATFORM_ADMIN_TOKEN: ci-platform-token
        run: |
          pkill -f /tmp/api || true
          /tmp/api &
          API_PID=$!
          trap "kill $API_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then break; fi
            sleep 0.5
          done

          # Without the platform token the route 404s (not advertised).
          status=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            http://127.0.0.1:8080/api/v1/platform/tenants \
            -H 'Content-Type: application/json' \
            -d '{"name":"Acme","slug":"acme","admin_email":"a@acme.test","admin_full_name":"A"}')
          if [ "$status" != "401" ]; then
            echo "platform route without token returned $status, expected 401"; exit 1
          fi

          # With the token: provision a tenant + admin, get a reset token.
          prov=$(curl -sS -X POST http://127.0.0.1:8080/api/v1/platform/tenants \
            -H 'Authorization: Bearer ci-platform-token' \
            -H 'Content-Type: application/json' \
            -d '{"name":"Acme Fuel","slug":"acme","admin_email":"admin@acme.test","admin_full_name":"Acme Admin"}')
          echo "provision: $prov"
          reset_token=$(echo "$prov" | python3 -c 'import json,sys; print(json.load(sys.stdin)["password_reset_token"])')
          if [ -z "$reset_token" ]; then
            echo "no reset token in provision response"; exit 1
          fi

          # The new admin sets a password via the standard reset flow.
          status=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            http://127.0.0.1:8080/api/v1/auth/password-reset/confirm \
            -H 'Content-Type: application/json' \
            -d "{\"token\":\"$reset_token\",\"new_password\":\"acme-admin-password-1\"}")
          if [ "$status" != "204" ]; then
            echo "password-reset confirm returned $status, expected 204"; exit 1
          fi

          # And can now log into the freshly provisioned tenant.
          login=$(curl -sS -X POST http://127.0.0.1:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"tenant_slug":"acme","email":"admin@acme.test","password":"acme-admin-password-1"}')
          token=$(echo "$login" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          if [ -z "$token" ]; then
            echo "provisioned admin could not log in: $login"; exit 1
          fi

          # The provisioned admin is system_admin (tenant-wide).
          perms=$(curl -sS http://127.0.0.1:8080/api/v1/me/permissions -H "Authorization: Bearer $token")
          echo "acme admin perms: $perms"
          echo "$perms" | grep -q '"tenant_wide":true'
          echo "$perms" | grep -q '"users.assign_roles"'

          # Slug reuse is rejected with 409.
          status=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            http://127.0.0.1:8080/api/v1/platform/tenants \
            -H 'Authorization: Bearer ci-platform-token' \
            -H 'Content-Type: application/json' \
            -d '{"name":"Dup","slug":"acme","admin_email":"d@acme.test","admin_full_name":"D"}')
          if [ "$status" != "409" ]; then
            echo "duplicate slug returned $status, expected 409"; exit 1
          fi
          echo "platform tenant provisioning works end-to-end"

      - name: Verify seeded rows
        run: |
          docker run --rm --network host postgres:16-alpine \
            psql "$DATABASE_URL" -c "
              SELECT (SELECT count(*) FROM tenants)                       AS tenants,
                     (SELECT count(*) FROM companies)                     AS companies,
                     (SELECT count(*) FROM regions)                       AS regions,
                     (SELECT count(*) FROM stations)                      AS stations,
                     (SELECT count(*) FROM users WHERE password_hash IS NOT NULL) AS users_with_password,
                     (SELECT count(*) FROM audit_logs)                    AS audit_logs,
                     (SELECT count(*) FROM outbox_events)                 AS outbox_events,
                     (SELECT count(*) FROM outbox_events WHERE published_at IS NOT NULL) AS outbox_published;
            "

      # Run the DB-backed integration suite LAST in this job. Each gated test
      # seeds and tears down its own tenant, but cleanup can leave residual rows
      # whose station codes (MIK-01/MSA-01) collide with the demo seed the bash
      # smoke steps above assert on â€” so the suite runs after them to keep them
      # isolated. It still has a migrated DB (applied above). The RLS-mode tests
      # reset the fuelgrid_app role password themselves. Race detector on,
      # matching the `go` job â€” the request-scoped connection / RLS pool wrapper
      # exercised here is exactly where a data race would hide.
      - name: Integration test suite (Postgres + Redis)
        env:
          TEST_DATABASE_URL: postgres://fuelgrid:fuelgrid@localhost:5432/fuelgrid?sslmode=disable
          TEST_REDIS_URL: redis://localhost:6379/0
        run: go test -race -count=1 -timeout 15m ./services/api/internal/server/...

  docker:
    name: Docker â€” build api image
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          load: true
          # Two tags: the immutable :ci handle for in-job smoke, and a
          # :sha-XXXXXXX handle so log analysis after the fact can map a
          # green build back to the exact image. On push-to-main the
          # `tag-main` step below also adds :main.
          tags: |
            fuelgrid-api:ci
            fuelgrid-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}

      - name: Tag main on push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag fuelgrid-api:ci fuelgrid-api:main
          # Registry push lands with the first real Fly deploy; for now
          # the tag exists locally to the job and the SHA-pinned tag is
          # the durable handle.
          docker image ls --filter=reference='fuelgrid-api:*'

      - name: Smoke test the image
        run: |
          docker run --rm -d --name api -p 8080:8080 fuelgrid-api:ci
          # Give the server a moment to bind.
          for i in $(seq 1 20); do
            if curl -sS -f http://127.0.0.1:8080/healthz > /dev/null; then
              echo "API is up"
              break
            fi
            sleep 0.5
          done
          curl -sS http://127.0.0.1:8080/healthz | tee /tmp/healthz.json
          grep -q '"status":"ok"' /tmp/healthz.json
          curl -sS http://127.0.0.1:8080/readyz | tee /tmp/readyz.json
          grep -q '"status":"ready"' /tmp/readyz.json
          curl -sS http://127.0.0.1:8080/metrics | head -10
          curl -sS http://127.0.0.1:8080/metrics | grep -q '^fuelgrid_'
          docker stop api
