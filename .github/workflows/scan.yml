name: Security Scan

# Supply-chain & vulnerability scanning. Standalone from ci.yml so the
# security surface (Trivy fs + image scans, SBOM) evolves independently of
# the build/test pipeline and reports into GitHub code-scanning.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly catch — newly disclosed CVEs land against already-merged code,
    # so re-scan main every Monday 06:00 UTC even with no new commits.
    - cron: '0 6 * * 1'

# Least privilege: read the repo, write SARIF to the security tab. Nothing else.
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  filesystem:
    name: Trivy — filesystem (vuln + misconfig + secret)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Full-visibility pass: every severity, SARIF only. This is what shows
      # up in the Security tab; it never fails the job (exit-code 0) so the
      # code-scanning record is always complete.
      - name: Trivy filesystem scan (SARIF report)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'
        env:
          # Cache the vuln DB across runs and avoid hitting GHCR rate limits.
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Upload filesystem SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        # Always upload, even if a later gate step fails, so the Security tab
        # reflects the run.
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # Gate pass: fail the build only on CRITICAL/HIGH vulns that have a fix
      # available. ignore-unfixed keeps un-actionable noise from blocking PRs.
      - name: Trivy filesystem gate (fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scanners: vuln
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

  image:
    name: Trivy — API image + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the same image ci.yml ships (services/api/Dockerfile), loaded
      # into the local daemon so Trivy and Syft can scan it by tag.
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          load: true
          tags: fuelgrid-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}

      # Full-visibility image scan -> SARIF for the Security tab.
      - name: Trivy image scan (SARIF report)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: image
          image-ref: fuelgrid-api:scan
          scanners: vuln,secret
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Upload image SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # Gate pass: same fixable CRITICAL/HIGH policy as the filesystem job.
      - name: Trivy image gate (fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: image
          image-ref: fuelgrid-api:scan
          scanners: vuln
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      # CycloneDX SBOM of the built image, archived as a build artifact for
      # supply-chain provenance / downstream license + component audits.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0.17.8
        with:
          image: fuelgrid-api:scan
          format: cyclonedx-json
          output-file: fuelgrid-api.cdx.json
          # The action also publishes a dependency snapshot to GitHub; the
          # archived artifact below is the durable, downloadable copy.
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-fuelgrid-api-cyclonedx
          path: fuelgrid-api.cdx.json
          if-no-files-found: error
