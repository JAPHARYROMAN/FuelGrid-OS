version: '2'

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - prealloc
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      # The `exported` rule demands a doc comment for every exported
      # symbol. We keep package-level docs and document the non-obvious
      # methods individually; insisting on a comment for boilerplate
      # CRUD methods isn't worth the noise.
      rules:
        - name: package-comments
        - name: var-declaration
        - name: redefines-builtin-id
  exclusions:
    paths:
      - vendor
      - bin
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
      # gosec G101 false-positives: `*Columns` consts are SQL column lists, not
      # hardcoded credentials — their identifiers merely contain "cred".
      - linters:
          - gosec
        text: 'G101'
        source: 'Columns = `'

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/japharyroman/fuelgrid-os
