# =============================================================================
# FuelGrid OS — API (Go / chi) Fly.io app config
# =============================================================================
# Image-based deploy: the CD pipeline (.github/workflows/deploy.yml) builds and
# pushes services/api/Dockerfile to GHCR, then runs `flyctl deploy --image
# ghcr.io/<owner>/<repo>-api:sha-<sha>`. There is NO in-Fly build of this app —
# do NOT add a [build] section; the rollout always pins an immutable GHCR tag.
#
# SECRETS ARE NOT STORED HERE. DATABASE_URL, DATABASE_APP_URL, REDIS_URL,
# AUTH_PASSWORD_PEPPER, MPESA_* credentials, SENTRY_DSN, PLATFORM_ADMIN_TOKEN
# etc. are set with `fly secrets set --app fuelgrid-api ...` (see
# .env.production.example and the Go-live runbook in docs/deployment.md). Only
# NON-secret config belongs in [env] below.
#
# Replace the placeholders: app name and primary_region.
# =============================================================================

app            = "fuelgrid-api"   # PLACEHOLDER — your Fly app name
primary_region = "jnb"            # PLACEHOLDER — e.g. jnb (Johannesburg), fra, iad

# Migrations: we deliberately do NOT use a Fly `release_command` to migrate.
# The CD pipeline's `migrate` job runs `golang-migrate up` against
# secrets.DATABASE_URL (the OWNER role) BEFORE the flyctl rollout — schema
# first, then the new image. Driving migrations from Fly as well would
# double-migrate (and run them as the app's runtime role, not the owner), so
# the rollout here is image-only. See docs/deployment.md "Database migrations".
[deploy]
  strategy = "rolling"

[build]
  # No build args / dockerfile: the image is supplied on the CLI via
  # `flyctl deploy --image ...`. This empty stanza documents the intent;
  # flyctl ignores it when --image is passed.

# Non-secret runtime config. Secrets go via `fly secrets set` (see header).
[env]
  NODE_ENV       = "production"
  API_HOST       = "0.0.0.0"
  API_PORT       = "8080"
  API_LOG_LEVEL  = "info"
  API_LOG_FORMAT = "json"
  # Fly terminates TLS at its edge and forwards over one proxy hop, so trust 1
  # hop to read the real client IP from X-Forwarded-For (AUTH-09).
  API_TRUSTED_PROXY_DEPTH = "1"
  # M-Pesa environment selector (sandbox|production). The credentials
  # themselves (MPESA_CONSUMER_KEY/SECRET/PASSKEY) are SECRETS — set via
  # `fly secrets`. MPESA_SHORTCODE / MPESA_CALLBACK_URL are non-secret config.
  MPESA_ENV = "production"
  # Observability exporter selection. SENTRY_DSN / OTEL endpoints credentials
  # are set via `fly secrets`. OTEL_EXPORTER itself is non-secret; flip to
  # "otlp" only once OTEL_EXPORTER_OTLP_ENDPOINT is set (otlp without a
  # reachable endpoint is a fatal boot error — see docs/deployment.md).
  OTEL_EXPORTER     = "none"
  OTEL_SERVICE_NAME = "fuelgrid-api"

[processes]
  # Single process tier today; a future worker tier can be added here sharing
  # the same image (e.g. worker = "/api --worker") without a new app.
  api = ""   # empty = use the image ENTRYPOINT (/api)

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "suspend"
  auto_start_machines = true
  # Never scale the API to zero: cold starts would fail the /readyz smoke gate
  # and add latency to the first request after idle. Keep at least one warm.
  min_machines_running = 1
  processes            = ["api"]

  # Readiness check: /readyz returns 200 {"status":"ready"} only when both the
  # postgres and redis probes pass. Fly pulls a machine out of rotation when it
  # stops returning 200.
  [[http_service.checks]]
    method        = "get"
    path          = "/readyz"
    interval      = "15s"
    timeout       = "5s"
    grace_period  = "20s"

# Memory/CPU: the Go API is light; 512MB shared-1x is a sane starting size for
# a single-region launch. Scale up with `fly scale vm` / `fly scale memory`
# once real load is observed.
[[vm]]
  size      = "shared-cpu-1x"
  memory    = "512mb"
  cpu_kind  = "shared"
  cpus      = 1
  processes = ["api"]
