# FuelGrid OS — local observability stack: Prometheus + Grafana + Alertmanager.
#
# This is a standalone compose file (separate from docker-compose.yml, which
# runs Postgres/Redis). It scrapes a FuelGrid API that you run on the HOST at
# :8080 (e.g. `go run ./services/api/cmd/api` or the compiled binary), not a
# containerised API — see prometheus.yml's host.docker.internal target.
#
# Run:    docker compose -f docker-compose.observability.yml up -d
# Stop:   docker compose -f docker-compose.observability.yml down
# Wipe:   docker compose -f docker-compose.observability.yml down -v
#
# UIs:
#   Prometheus     http://localhost:9090
#   Grafana        http://localhost:3001  (admin / admin — change on first login)
#   Alertmanager   http://localhost:9093
#
# See deploy/observability/README.md for the full runbook.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fuelgrid-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus-alerts.yml:/etc/prometheus/rules/prometheus-alerts.yml:ro
      - prometheus_data:/prometheus
    # Lets host.docker.internal resolve to the host on Linux (built-in on
    # Docker Desktop for macOS/Windows).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: fuelgrid-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '${ALERTMANAGER_PORT:-9093}:9093'
    volumes:
      - ./deploy/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9093/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: fuelgrid-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # No public sign-up; provisioned datasource + dashboards only.
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  prometheus_data:
    name: fuelgrid_prometheus_data
  alertmanager_data:
    name: fuelgrid_alertmanager_data
  grafana_data:
    name: fuelgrid_grafana_data
