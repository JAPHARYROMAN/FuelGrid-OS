  # ===== Phase 11: Workforce — employees, shift teams, rotation =====
  /api/v1/employee-roles:
    get:
      tags: [Workforce]
      summary: List tenant employee roles (station.read)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Workforce]
      summary: Add an employee role to the tenant catalogue (station.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                code: { type: string, description: Optional URL-safe role code; generated from name when omitted. }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Employee role already exists }
  /api/v1/stations/{stationID}/employees:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Workforce]
      summary: List a station's employees (station.read)
      parameters: [{ $ref: '#/components/parameters/LimitParam' }, { $ref: '#/components/parameters/OffsetParam' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Workforce]
      summary: Add an employee to the station (station.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name]
              properties:
                full_name:     { type: string }
                role:          { type: string, description: Employee role code from /api/v1/employee-roles }
                user_id:       { type: string, format: uuid }
                employee_code: { type: string }
                phone:         { type: string }
                email:         { type: string }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
        '409': { description: An employee is already linked to that user }
  /api/v1/employees/{employeeID}:
    patch:
      tags: [Workforce]
      summary: Update an employee (station.manage)
      parameters: [{ in: path, name: employeeID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:     { type: string }
                role:          { type: string, description: Employee role code from /api/v1/employee-roles }
                status:        { type: string, enum: [active, inactive] }
                user_id:       { type: string, format: uuid }
                employee_code: { type: string }
                phone:         { type: string }
                email:         { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Employee not found }
  /api/v1/stations/{stationID}/teams:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Workforce]
      summary: List a station's three shift teams (station.read)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Workforce]
      summary: Ensure the station's three rotation teams exist (station.manage)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                names: { type: array, items: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
  /api/v1/teams/{teamID}/members:
    put:
      tags: [Workforce]
      summary: Replace a team's membership (station.manage)
      parameters: [{ in: path, name: teamID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_ids]
              properties:
                employee_ids: { type: array, items: { type: string, format: uuid } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Team not found }
  /api/v1/stations/{stationID}/rotation-anchor:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Workforce]
      summary: Get the station's rotation anchor date (station.read)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
    put:
      tags: [Workforce]
      summary: Set or clear the station's rotation anchor date (station.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rotation_anchor_date: { type: string, format: date, nullable: true }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
  /api/v1/stations/{stationID}/roster:
    get:
      tags: [Workforce]
      summary: Forward-looking rotation roster (station.read)
      parameters:
        - { in: path,  name: stationID, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: from,      schema: { type: string, format: date } }
        - { in: query, name: days,      schema: { type: integer, minimum: 1, maximum: 60 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
  /api/v1/stations/{stationID}/scheduled-team:
    get:
      tags: [Workforce]
      summary: The team on duty for a date + slot (station.read)
      parameters:
        - { in: path,  name: stationID, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: date,      schema: { type: string, format: date } }
        - { in: query, name: slot,      required: true, schema: { type: string, enum: [morning, evening] } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    LimitParam:
      in: query
      name: limit
      required: false
      description: Maximum number of items to return (page size).
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    OffsetParam:
      in: query
      name: offset
      required: false
      description: Number of items to skip before collecting the page.
      schema: { type: integer, minimum: 0, default: 0 }

  responses:
    BadRequest:
      description: Validation error
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unauthorized:
      description: Authentication required or invalid
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Authenticated but not authorized
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    RateLimited:
      description: Too many requests
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  schemas:
    Error:
      type: object
      properties:
        error:  { type: string }
        status: { type: integer }
    # Generic JSON object for endpoints whose payload is documented for
    # coverage but whose field-level shape is intentionally left open.
    Object:
      type: object
      additionalProperties: true
    # Per-supplier AP aging with day-aged buckets (also used for the grand
    # total row, whose supplier_id is the zero UUID). Money fields are decimal
    # strings; current + d1_30 + d31_60 + d61_90 + d90_plus == outstanding.
    SupplierAging:
      type: object
      required: [supplier_id, outstanding, open_count, current, d1_30, d31_60, d61_90, d90_plus]
      properties:
        supplier_id: { type: string, format: uuid }
        outstanding: { type: string, description: Total outstanding across all buckets (decimal string) }
        open_count:  { type: integer }
        current:     { type: string, description: Not yet due or no due date (decimal string) }
        d1_30:       { type: string, description: 1-30 days past due (decimal string) }
        d31_60:      { type: string, description: 31-60 days past due (decimal string) }
        d61_90:      { type: string, description: 61-90 days past due (decimal string) }
        d90_plus:    { type: string, description: More than 90 days past due (decimal string) }
    # Deterministic report insights + data-quality warnings (REPORTING).
    ReportInsights:
      type: object
      properties:
        insights:
          type: array
          items:
            type: object
            properties:
              severity: { type: string, enum: [info, warning, critical] }
              message: { type: string }
              recommended_action: { type: string }
            required: [severity, message]
        data_quality:
          type: array
          items:
            type: object
            properties:
              message: { type: string }
            required: [message]
      required: [insights, data_quality]
    # Structured, drillable report envelope returned by the /reports/* endpoints.
    # Every money/litre figure (summary values, table cells, chart_data) is a
    # decimal string. chart_data is report-specific so it is left untyped here.
    ReportEnvelope:
      type: object
      properties:
        metadata:
          type: object
          properties:
            report_key:   { type: string }
            title:        { type: string }
            generated_at: { type: string, format: date-time }
            station_id:   { type: string, format: uuid }
            period:       { type: string }
          required: [report_key, title, generated_at, period]
        filters_used:
          type: object
          additionalProperties: { type: string }
        data_quality:
          type: array
          items:
            type: object
            properties:
              level:   { type: string }
              message: { type: string }
            required: [level, message]
        summary:
          type: array
          items:
            type: object
            properties:
              label:     { type: string }
              value:     { type: string, description: Decimal string (money/litre) or a count }
              unit:      { type: string }
              delta:     { type: string }
              direction: { type: string, enum: [up, down, flat] }
            required: [label, value]
        chart_data:
          description: Report-specific chart payload; all numeric figures are decimal strings.
        table:
          type: object
          properties:
            columns: { type: array, items: { type: string } }
            rows:    { type: array, items: { type: array, items: { type: string } } }
          required: [columns, rows]
        insights:
          type: array
          items:
            type: object
            properties:
              severity:           { type: string, enum: [info, warning, critical] }
              message:            { type: string }
              recommended_action: { type: string }
            required: [severity, message]
        recommended_actions: { type: array, items: { type: string } }
        drilldown:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              href:  { type: string }
            required: [label, href]
        export_options:
          type: array
          items:
            type: object
            properties:
              format: { type: string, enum: [csv, pdf, xlsx] }
              url:    { type: string }
            required: [format, url]
      required: [metadata, filters_used, data_quality, summary, chart_data, table, insights, recommended_actions, drilldown, export_options]
    ReportsOverview:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        categories:
          type: array
          items:
            type: object
            properties:
              key:           { type: string }
              title:         { type: string }
              description:   { type: string }
              headline:      { type: string }
              headline_unit: { type: string }
              alert_count:   { type: integer }
              href:          { type: string }
            required: [key, title, description, headline, headline_unit, alert_count, href]
      required: [generated_at, categories]
    ReportExportRequest:
      type: object
      required: [report_key, format]
      properties:
        report_key: { type: string }
        format:     { type: string, enum: [csv, pdf, xlsx] }
        filters:
          type: object
          additionalProperties: { type: string }
    ReportExportResult:
      type: object
      properties:
        report_key: { type: string }
        format:     { type: string }
        url:        { type: string }
      required: [report_key, format, url]
    # Standard paginated list envelope returned by the paginated list
    # endpoints: {items, count, limit, offset, has_more}. Monetary, litre,
    # and rate values inside items are decimal strings (type: string).
    Paged:
      type: object
      properties:
        items:    { type: array, items: { $ref: '#/components/schemas/Object' } }
        count:    { type: integer, description: Total matching rows (not just this page) }
        limit:    { type: integer }
        offset:   { type: integer }
        has_more: { type: boolean }
    StatusResponse:
      type: object
      properties: { status: { type: string } }
    ReadyResponse:
      type: object
      properties:
        status: { type: string }
        checks:
          type: object
          additionalProperties: { type: string }

    LoginRequest:
      type: object
      required: [tenant_slug, email, password]
      properties:
        tenant_slug: { type: string }
        email:       { type: string, format: email }
        password:    { type: string }
        mfa_code:    { type: string }
    LoginResponse:
      type: object
      properties:
        token:        { type: string }
        expires_at:   { type: string, format: date-time }
        mfa_required: { type: boolean }

    Me:
      type: object
      properties:
        user_id:       { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        session_id:    { type: string, format: uuid }
        mfa_satisfied: { type: boolean }
        mfa_enabled:   { type: boolean }
        mfa_required:  { type: boolean }
        mfa_backup_codes_remaining: { type: integer }
    MePermissions:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: object
            properties:
              code:           { type: string }
              station_scoped: { type: boolean }
        station_ids:
          type: array
          items: { type: string, format: uuid }
        tenant_wide: { type: boolean }

    Session:
      type: object
      properties:
        id:         { type: string, format: uuid }
        issued_at:  { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        user_agent: { type: string }
        is_current: { type: boolean }
    SessionList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Session' } }
        count: { type: integer }

    SetupBlocker:
      type: object
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }
    SetupChecklistStep:
      type: object
      required: [code, title, description, href, cta, required, status, ready, blocked, count, required_count]
      properties:
        code:           { type: string }
        title:          { type: string }
        description:    { type: string }
        href:           { type: string }
        cta:            { type: string }
        required:       { type: boolean }
        status:         { type: string, enum: [pending, completed, skipped] }
        ready:          { type: boolean }
        blocked:        { type: boolean }
        blocked_reason: { type: string }
        count:          { type: integer }
        required_count: { type: integer }
        completed_at:   { type: string, format: date-time }
        completed_by:   { type: string, format: uuid }
        updated_at:     { type: string, format: date-time }
        notes:          { type: string }
    SetupChecklist:
      type: object
      required: [steps, required_total, required_ready, required_completed, operationally_ready, blocked]
      properties:
        steps: { type: array, items: { $ref: '#/components/schemas/SetupChecklistStep' } }
        required_total:      { type: integer }
        required_ready:      { type: integer }
        required_completed:  { type: integer }
        operationally_ready: { type: boolean }
        blocked: { type: array, items: { $ref: '#/components/schemas/SetupBlocker' } }
    SetupStepPatch:
      type: object
      required: [step_code, status]
      properties:
        step_code: { type: string }
        status:    { type: string, enum: [pending, completed, skipped] }
        notes:     { type: string }

    Company:
      type: object
      properties:
        id:              { type: string, format: uuid }
        tenant_id:       { type: string, format: uuid }
        name:            { type: string }
        legal_name:      { type: string }
        registration_no: { type: string }
        tax_id:          { type: string }
        currency:        { type: string, minLength: 3, maxLength: 3 }
        timezone:        { type: string }
        status:          { type: string }
    CompanyCreate:
      type: object
      required: [name]
      properties:
        name:            { type: string }
        legal_name:      { type: string }
        registration_no: { type: string }
        tax_id:          { type: string }
        currency:        { type: string, minLength: 3, maxLength: 3 }
        timezone:        { type: string }
    CompanyUpdate:
      type: object
      properties:
        name:            { type: string }
        legal_name:      { type: string }
        registration_no: { type: string }
        tax_id:          { type: string }
        currency:        { type: string }
        timezone:        { type: string }
        status:          { type: string }
    CompanyList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Company' } }
        count: { type: integer }

    Attachment:
      type: object
      properties:
        id:           { type: string, format: uuid }
        entity_type:  { type: string }
        entity_id:    { type: string, format: uuid }
        station_id:   { type: string, format: uuid, nullable: true }
        filename:     { type: string }
        content_type: { type: string, enum: [application/pdf, image/png, image/jpeg] }
        size_bytes:   { type: integer, format: int64 }
        checksum:     { type: string, description: hex sha-256 of the bytes }
        uploaded_by:  { type: string, format: uuid, nullable: true }
        created_at:   { type: string, format: date-time }
        download_url: { type: string }
    Branding:
      type: object
      properties:
        display_name:      { type: string }
        legal_name:        { type: string }
        tax_id:            { type: string }
        registration_no:   { type: string }
        address_line1:     { type: string }
        address_line2:     { type: string }
        city:              { type: string }
        country:           { type: string }
        phone:             { type: string }
        email:             { type: string }
        website:           { type: string }
        footer_note:       { type: string }
        has_logo:          { type: boolean }
        logo_content_type: { type: string }
        logo_url:          { type: string }
        updated_at:        { type: string, format: date-time }
    BrandingUpdate:
      type: object
      properties:
        display_name:    { type: string }
        legal_name:      { type: string }
        tax_id:          { type: string }
        registration_no: { type: string }
        address_line1:   { type: string }
        address_line2:   { type: string }
        city:            { type: string }
        country:         { type: string }
        phone:           { type: string }
        email:           { type: string }
        website:         { type: string }
        footer_note:     { type: string }

    Region:
      type: object
      properties:
        id:         { type: string, format: uuid }
        tenant_id:  { type: string, format: uuid }
        company_id: { type: string, format: uuid }
        name:       { type: string }
        code:       { type: string }
        status:     { type: string }
    RegionCreate:
      type: object
      required: [company_id, name]
      properties:
        company_id: { type: string, format: uuid }
        name:       { type: string }
        code:       { type: string }
    RegionUpdate:
      type: object
      properties:
        name:   { type: string }
        code:   { type: string }
        status: { type: string }
    RegionList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Region' } }
        count: { type: integer }

    Station:
      type: object
      properties:
        id:           { type: string, format: uuid }
        tenant_id:    { type: string, format: uuid }
        company_id:   { type: string, format: uuid }
        region_id:    { type: string, format: uuid }
        name:         { type: string }
        code:         { type: string }
        address_line1: { type: string }
        address_line2: { type: string }
        city:         { type: string }
        state:        { type: string }
        country:      { type: string }
        latitude:     { type: number, minimum: -90,  maximum: 90 }
        longitude:    { type: number, minimum: -180, maximum: 180 }
        timezone:     { type: string }
        status:       { type: string }
    StationCreate:
      type: object
      required: [company_id, name, code]
      properties:
        company_id: { type: string, format: uuid }
        region_id:  { type: string, format: uuid }
        name:       { type: string }
        code:       { type: string }
        address_line1: { type: string }
        address_line2: { type: string }
        city:       { type: string }
        state:      { type: string }
        country:    { type: string }
        latitude:   { type: number }
        longitude:  { type: number }
        timezone:   { type: string }
    StationUpdate:
      type: object
      properties:
        region_id:  { type: string, format: uuid }
        name:       { type: string }
        code:       { type: string }
        city:       { type: string }
        country:    { type: string }
        status:     { type: string }
    StationList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Station' } }
        count: { type: integer }

    User:
      type: object
      properties:
        id:            { type: string, format: uuid }
        email:         { type: string, format: email }
        full_name:     { type: string }
        status:        { type: string }
        mfa_enabled:   { type: boolean }
        last_login_at: { type: string, format: date-time }
        created_at:    { type: string, format: date-time }
        roles:         { type: array, items: { type: string } }
        station_ids:   { type: array, items: { type: string, format: uuid } }
        tenant_wide:   { type: boolean }
    UserList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/User' } }
        count: { type: integer }

    Role:
      type: object
      properties:
        id:          { type: string, format: uuid }
        code:        { type: string }
        name:        { type: string }
        description: { type: string }
        is_system:   { type: boolean }
        permissions: { type: array, items: { type: string } }
    RoleList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Role' } }
        count: { type: integer }

    AuditLog:
      type: object
      properties:
        id:             { type: string, format: uuid }
        tenant_id:      { type: string, format: uuid }
        actor_id:       { type: string, format: uuid }
        action:         { type: string }
        entity_type:    { type: string }
        entity_id:      { type: string }
        previous_value: {}
        new_value:      {}
        reason:         { type: string }
        ip:             { type: string }
        user_agent:     { type: string }
        request_id:     { type: string }
        occurred_at:    { type: string, format: date-time }
    AuditLogList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AuditLog' } }
        count: { type: integer }
        limit: { type: integer }

    StatusChange:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [active, inactive, maintenance, decommissioned] }
        reason: { type: string, description: Required when moving to maintenance or decommissioned }

    Product:
      type: object
      properties:
        id:                     { type: string, format: uuid }
        tenant_id:              { type: string, format: uuid }
        code:                   { type: string }
        name:                   { type: string }
        category:               { type: string, enum: [fuel, gas, lubricant, additive, other] }
        unit:                   { type: string, enum: [litre, kg, unit] }
        default_price:          { type: number }
        tax_rate:               { type: number }
        density_kg_m3:          { type: number }
        loss_tolerance_percent: { type: number }
        color:                  { type: string, description: Hex colour, e.g. '#f97316' }
        status:                 { type: string }
    ProductCreate:
      type: object
      required: [code, name]
      properties:
        code:                   { type: string }
        name:                   { type: string }
        category:               { type: string }
        unit:                   { type: string }
        default_price:          { type: number }
        tax_rate:               { type: number }
        density_kg_m3:          { type: number }
        loss_tolerance_percent: { type: number }
        color:                  { type: string }
    ProductUpdate:
      type: object
      properties:
        code:                   { type: string }
        name:                   { type: string }
        category:               { type: string }
        unit:                   { type: string }
        default_price:          { type: number }
        tax_rate:               { type: number }
        density_kg_m3:          { type: number }
        loss_tolerance_percent: { type: number }
        color:                  { type: string }
        status:                 { type: string }
    ProductList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Product' } }
        count: { type: integer }

    Tank:
      type: object
      properties:
        id:                { type: string, format: uuid }
        tenant_id:         { type: string, format: uuid }
        station_id:        { type: string, format: uuid }
        product_id:        { type: string, format: uuid }
        name:              { type: string }
        code:              { type: string }
        capacity_litres:   { type: number }
        safe_min_litres:   { type: number }
        safe_max_litres:   { type: number }
        dead_stock_litres: { type: number }
        has_water_sensor:  { type: boolean }
        has_temp_sensor:   { type: boolean }
        status:            { type: string }
        installation_date: { type: string, format: date }
        decommission_date: { type: string, format: date }
        current_litres:            { type: string, description: Latest dip-resolved volume as an exact decimal string (numeric -> text); station overview only }
        current_dip_reading_type:  { type: string, enum: [opening, closing], description: Station overview only }
        current_dip_recorded_at:   { type: string, format: date-time, description: Station overview only }
        current_dip_business_date: { type: string, format: date, description: Station overview only }
    TankCreate:
      type: object
      required: [station_id, product_id, name, code, capacity_litres]
      properties:
        station_id:        { type: string, format: uuid }
        product_id:        { type: string, format: uuid }
        name:              { type: string }
        code:              { type: string }
        capacity_litres:   { type: number }
        safe_min_litres:   { type: number }
        safe_max_litres:   { type: number }
        dead_stock_litres: { type: number }
        has_water_sensor:  { type: boolean }
        has_temp_sensor:   { type: boolean }
        installation_date: { type: string, format: date }
    TankUpdate:
      type: object
      properties:
        product_id:        { type: string, format: uuid }
        name:              { type: string }
        code:              { type: string }
        capacity_litres:   { type: number }
        safe_min_litres:   { type: number }
        safe_max_litres:   { type: number }
        dead_stock_litres: { type: number }
        has_water_sensor:  { type: boolean }
        has_temp_sensor:   { type: boolean }
        installation_date: { type: string, format: date }
        decommission_date: { type: string, format: date }
