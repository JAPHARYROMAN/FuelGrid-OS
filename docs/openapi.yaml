  # ---------------------------------------------------------------------------
  # Approvals
  # ---------------------------------------------------------------------------
  /api/v1/approval-policies:
    get:
      tags: [Approvals]
      summary: List approval policies
      parameters: [{ $ref: '#/components/parameters/LimitParam' }, { $ref: '#/components/parameters/OffsetParam' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Approvals]
      summary: Create an approval policy
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/approval-policies/simulate:
    post:
      tags: [Approvals]
      summary: Simulate whether a workflow + amount would require approval
      description: >-
        Resolves the active approval policies for a workflow_type and optional
        amount using the same rule the approval engine applies when raising a
        request, without persisting anything. Returns whether an approval would
        be required, the strictest matching policy id, the required-approvals
        count, and the required approver role (if any). Requires
        approval_policy.manage.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/approval-policies/{id}:
    put:
      tags: [Approvals]
      summary: Edit an approval policy's matching rule
      description: >-
        Updates workflow_type, min_amount, required_approvals, and required_role
        of an existing policy. Does not change its enabled/disabled status (use
        the status sub-resource). Requires approval_policy.manage. Audited as
        approval.policy_changed.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Approvals]
      summary: Edit an approval policy's matching rule
      description: Identical to PUT — edits the policy's matching rule. Requires approval_policy.manage.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/approval-policies/{id}/status:
    patch:
      tags: [Approvals]
      summary: Enable or disable an approval policy
      description: >-
        Sets the policy status to active (enabled) or archived (disabled). A
        disabled policy is ignored by the approval engine — it no longer
        requires approval in simulation or when a request is raised. Requires
        approval_policy.manage. Audited as approval.policy_changed.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/approval-requests:
    get:
      tags: [Approvals]
      summary: List approval requests
      parameters: [{ $ref: '#/components/parameters/LimitParam' }, { $ref: '#/components/parameters/OffsetParam' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Approvals]
      summary: Raise an approval request
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/approval-requests/{id}/decide:
    post:
      tags: [Approvals]
      summary: Approve or reject an approval request
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '200': { description: Decided, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Already decided }

