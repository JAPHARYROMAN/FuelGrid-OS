        water_mm:      { type: number }
        temperature_c: { type: number }
        chart_id:      { type: string, format: uuid }
        recorded_by:   { type: string, format: uuid }
        recorded_at:   { type: string, format: date-time }
        supersedes_id: { type: string, format: uuid }
        status:        { type: string, enum: [active, superseded] }
    DipReadingList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/DipReading' } }
        count: { type: integer }

    ShiftCloseLine:
      type: object
      properties:
        nozzle_id:       { type: string, format: uuid }
        opening_reading: { type: number }
        closing_reading: { type: number }
        litres_sold:     { type: number }
        unit_price:      { type: number }
        expected_value:  { type: number }
    CashSubmission:
      type: object
      properties:
        id:                  { type: string, format: uuid }
        shift_id:            { type: string, format: uuid }
        expected_cash:       { type: number }
        cash_amount:         { type: number }
        mobile_money_amount: { type: number }
        card_amount:         { type: number }
        credit_amount:       { type: number }
        submitted_total:     { type: number }
        variance:            { type: number }
        submitted_by:        { type: string, format: uuid }
        submitted_at:        { type: string, format: date-time }
        notes:               { type: string }
    ShiftCloseSummary:
      type: object
      properties:
        shift:           { $ref: '#/components/schemas/Shift' }
        lines:           { type: array, items: { $ref: '#/components/schemas/ShiftCloseLine' } }
        expected_cash:   { type: number }
        cash_submission: { oneOf: [{ $ref: '#/components/schemas/CashSubmission' }, { type: 'null' }] }
    ShiftException:
      type: object
      properties:
        id:          { type: string, format: uuid }
        tenant_id:   { type: string, format: uuid }
        shift_id:    { type: string, format: uuid }
        type:        { type: string, enum: [missing_reading, cash_variance, meter_rollback, late_close, other] }
        severity:    { type: string }
        detail:      { type: string }
        status:      { type: string, enum: [open, resolved] }
        raised_at:   { type: string, format: date-time }
        resolved_by: { type: string, format: uuid }
        resolved_at: { type: string, format: date-time }
    ShiftExceptionList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ShiftException' } }
        count: { type: integer }

    ShiftAttendance:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        station_id: { type: string, format: uuid }
        shift_id: { type: string, format: uuid }
        attendant_id: { type: string, format: uuid }
        status: { type: string, enum: [checked_in, checked_out] }
        check_in_at: { type: string, format: date-time }
        check_out_at: { type: string, format: date-time }
        device_info: { type: object, additionalProperties: true }
    ShiftAttendanceList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ShiftAttendance' } }
        count: { type: integer }
    ConfirmedNozzleAssignment:
      allOf:
        - $ref: '#/components/schemas/NozzleAssignment'
        - type: object
          properties:
            confirmed_at: { type: string, format: date-time }
    ReadingVerification:
      type: object
      description: Dual-value supervisor verification of one closing meter reading. All reading figures are exact decimal strings (numeric 14,3); the underlying meter reading is never mutated.
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        station_id: { type: string, format: uuid }
        shift_id: { type: string, format: uuid }
        nozzle_id: { type: string, format: uuid }
        reading_id: { type: string, format: uuid }
        attendant_submitted_reading: { type: string }
        supervisor_verified_reading: { type: string }
        final_approved_reading: { type: string }
        status: { type: string, enum: [approved, corrected, rejected] }
        reason: { type: string }
        verified_by: { type: string, format: uuid }
        verified_at: { type: string, format: date-time }
    ReadingVerificationList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ReadingVerification' } }
        count: { type: integer }
        newly_verified: { type: integer }
    CollectionReceipt:
      type: object
      description: Supervisor confirmation of a shift's cash submission. Every money figure is an exact decimal string (numeric 14,2); difference = received − expected.
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        station_id: { type: string, format: uuid }
        shift_id: { type: string, format: uuid }
        cash_submission_id: { type: string, format: uuid }
        expected_amount: { type: string }
        attendant_submitted_total: { type: string }
        supervisor_received_total: { type: string }
        difference: { type: string }
        status: { type: string, enum: [received, approved_with_difference, rejected] }
        reason: { type: string }
        supervisor_comment: { type: string }
        received_by: { type: string, format: uuid }
        received_at: { type: string, format: date-time }
    ExpectedOpeningReading:
      type: object
      description: One assigned nozzle's expected opening meter — the previous shift's final approved closing (exact decimal string), absent when the nozzle has no prior closing at the station.
      properties:
        assignment_id: { type: string, format: uuid }
        nozzle_id: { type: string, format: uuid }
        attendant_id: { type: string, format: uuid }
        expected_opening_reading: { type: string }
        source: { type: string, enum: [verified, raw] }
        source_shift_id: { type: string, format: uuid }
        source_reading_id: { type: string, format: uuid }
    ExpectedOpeningReadingList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ExpectedOpeningReading' } }
        count: { type: integer }

    AttendantStation:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    AttendantExpectedToday:
      type: object
      description: Present when the actor has no shift yet but their rotation team is on duty today.
      properties:
        slot: { type: string, enum: [morning, evening] }
        team_id: { type: string, format: uuid }
        team_name: { type: string }
    AttendantAttendance:
      type: object
      properties:
        status: { type: string, enum: [not_checked_in, checked_in, checked_out] }
        check_in_at: { type: string, format: date-time }
        check_out_at: { type: string, format: date-time }
    AttendantAssignment:
      type: object
      description: One of the actor's own nozzle assignments on the shift, with its confirmation state.
      properties:
        assignment_id: { type: string, format: uuid }
        nozzle_id: { type: string, format: uuid }
        pump_number: { type: integer }
        nozzle_number: { type: integer }
        product_name: { type: string }
        product_color: { type: string }
        meter_decimal_places:
          type: integer
          description: The nozzle's meter precision (0..4); capture screens validate input scale against it client-side, mirroring the server's 422.
        assigned_at: { type: string, format: date-time }
        confirmed_at: { type: string, format: date-time }
    AttendantReading:
      type: object
      description: The actor's own meter progress on one nozzle. Reading figures are exact decimal strings (numeric 14,3). verification_status is set once a closing exists — pending until a reading verification lands, then that row's status. Once verified, final_reading carries the final approved figure (the supervisor's value when corrected) and verification_reason the supervisor's reason where one was required (Phase 3 review-status screen).
      properties:
        nozzle_id: { type: string, format: uuid }
        opening_reading: { type: string }
        closing_reading: { type: string }
        verification_status: { type: string, enum: [pending, approved, corrected, rejected] }
        final_reading: { type: string, description: The verification's final approved reading (exact decimal string), present once verified }
        verification_reason: { type: string, description: The supervisor's reason, present when the verification required one (corrected/rejected) }
    AttendantCurrentShift:
      type: object
      description: The Mobile Attendant App workflow snapshot — one self-scoped payload the home screen renders directly.
      properties:
        status: { type: string, enum: [off_duty, expected_today, on_shift, complete] }
        next_action:
          type: string
          enum:
            [
              off_duty,
              await_shift_open,
              check_in,
              confirm_assignment,
              verify_opening_readings,
              open_shift,
              working,
              submit_closing_readings,
              await_reading_verification,
              submit_collections,
              await_collection_receipt,
              complete,
              blocked,
            ]
        user_message: { type: string }
        blocking_code:
          type: string
          description: Machine-readable code present when next_action is blocked.
          enum: [awaiting_nozzle_assignment, awaiting_shift_close, collection_rejected]
        station: { $ref: '#/components/schemas/AttendantStation' }
        shift: { $ref: '#/components/schemas/Shift' }
        expected_today: { $ref: '#/components/schemas/AttendantExpectedToday' }
        attendance: { $ref: '#/components/schemas/AttendantAttendance' }
        assignments: { type: array, items: { $ref: '#/components/schemas/AttendantAssignment' } }
        readings: { type: array, items: { $ref: '#/components/schemas/AttendantReading' } }
        expected_openings_available: { type: boolean }
        expected_cash: { type: string, description: Exact decimal string (numeric 14,2), present once the shift is closed }
        cash_submission: { $ref: '#/components/schemas/CashSubmission' }
        collection_receipt: { $ref: '#/components/schemas/CollectionReceipt' }

    MyShiftNozzle:
      type: object
      properties:
        nozzle_id:            { type: string, format: uuid }
        pump_number:          { type: integer }
        nozzle_number:        { type: integer }
        product_name:         { type: string }
        product_color:        { type: string }
        tank_id:              { type: string, format: uuid }
        tank_code:            { type: string }
        default_price:        { type: number }
        meter_decimal_places: { type: integer }
        initial_meter_reading: { type: string }
        opening_reading:      { type: number }
        closing_reading:      { type: number }
    MyShiftTank:
      type: object
      properties:
        tank_id:               { type: string, format: uuid }
        tank_code:             { type: string }
        product_color:         { type: string }
        opening_dip_mm:        { type: number }
        opening_volume_litres: { type: number }
        closing_dip_mm:        { type: number }
        closing_volume_litres: { type: number }
    MyShift:
      type: object
      properties:
        shift:            { oneOf: [{ $ref: '#/components/schemas/Shift' }, { type: 'null' }] }
        assigned_nozzles: { type: array, items: { $ref: '#/components/schemas/MyShiftNozzle' } }
        assigned_tanks:   { type: array, items: { $ref: '#/components/schemas/MyShiftTank' } }
        expected_cash:    { type: number }
        cash_submission:  { oneOf: [{ $ref: '#/components/schemas/CashSubmission' }, { type: 'null' }] }

    OperationsAttendant:
      type: object
      properties:
        user_id:   { type: string, format: uuid }
        full_name: { type: string }
        email:     { type: string, format: email }
    OperationsShift:
      allOf:
        - $ref: '#/components/schemas/Shift'
        - type: object
          properties:
            attendants:          { type: array, items: { $ref: '#/components/schemas/OperationsAttendant' } }
            nozzle_assignments:  { type: array, items: { $ref: '#/components/schemas/NozzleAssignment' } }
            expected_cash:       { type: number }
            litres_sold:         { type: number }
            cash_submission:     { oneOf: [{ $ref: '#/components/schemas/CashSubmission' }, { type: 'null' }] }
            exceptions:          { type: array, items: { $ref: '#/components/schemas/ShiftException' } }
            open_exception_count: { type: integer }
    OperationsOverview:
      type: object
      properties:
        station: { $ref: '#/components/schemas/Station' }
        day:     { oneOf: [{ $ref: '#/components/schemas/OperatingDay' }, { type: 'null' }] }
        shifts:  { type: array, items: { $ref: '#/components/schemas/OperationsShift' } }
