        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/tanks/{id}/ledger:
    get:
      tags: [Inventory]
      summary: Tank movement ledger
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/StockMovementList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/tanks/{id}/book-balance:
    get:
      tags: [Inventory]
      summary: Tank book balance (litres, decimal string)
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TankBookBalance' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/tanks/{id}/opening-balance:
    post:
      tags: [Inventory]
      summary: Set a tank's opening balance
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SetOpeningBalanceRequest' } } } }
      responses:
        '201': { description: Set, content: { application/json: { schema: { $ref: '#/components/schemas/StockMovement' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Opening balance already exists }
        '422': { description: No dip reading exists when from_dip is true }
  /api/v1/opening-stock-requests:
    get:
      tags: [Inventory]
      summary: List opening-stock requests
      description: >-
        The opening-stock draft -> approve(lock) / reject lifecycle queue
        (Feature 1.6). Optionally filter by status and/or tank_id. Gated by
        stock.adjust.
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
        - { in: query, name: status, required: false, schema: { type: string, enum: [draft, approved, rejected] } }
        - { in: query, name: tank_id, required: false, schema: { type: string, format: uuid } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OpeningStockRequestList' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Inventory]
      summary: Enter a draft opening stock
      description: >-
        Record a tank's opening litres (non-negative decimal, or from_dip) in
        'draft' state for review. Gated by the station-scoped stock.adjust at the
        tank's station.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestOpeningStockRequest' } } } }
      responses:
        '201': { description: Drafted, content: { application/json: { schema: { $ref: '#/components/schemas/OpeningStockRequest' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: A live or locked opening stock already exists for this tank }
        '422': { description: No dip reading exists when from_dip is true }
  /api/v1/opening-stock-requests/{id}:
    get:
      tags: [Inventory]
      summary: Get an opening-stock request
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OpeningStockRequest' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/opening-stock-requests/{id}/approve:
    post:
      tags: [Inventory]
      summary: Approve (lock) a draft opening stock
      description: >-
        Posts the genesis 'opening' movement to the tank's ledger and LOCKS the
        request. Separation of duties: the requester cannot approve their own
        opening stock (403). Idempotent and immutable — only a 'draft' approves;
        a locked one never re-approves (409). Gated by the station-scoped
        stock.approve_adjustment at the tank's station.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustmentDecision' } } } }
      responses:
        '200': { description: Approved and locked, content: { application/json: { schema: { $ref: '#/components/schemas/OpeningStockRequest' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition, or opening already exists }
  /api/v1/opening-stock-requests/{id}/reject:
    post:
      tags: [Inventory]
      summary: Reject a draft opening stock
      description: >-
        Moves a draft -> rejected, recording a reason. The requester cannot
        decide their own request (403). A rejected request frees the tank for a
        corrected figure. Gated by stock.approve_adjustment at the tank's station.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustmentDecision' } } } }
      responses:
        '200': { description: Rejected, content: { application/json: { schema: { $ref: '#/components/schemas/OpeningStockRequest' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }
  /api/v1/stock-adjustments:
    get:
      tags: [Inventory]
      summary: List stock adjustments
      description: >-
        The request -> approve -> post lifecycle queue. Optionally filter by
        status and/or tank_id. Gated by stock.adjust.
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
        - { in: query, name: status, required: false, schema: { type: string, enum: [requested, approved, posted, rejected] } }
        - { in: query, name: tank_id, required: false, schema: { type: string, format: uuid } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustmentList' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Inventory]
      summary: Request a stock adjustment
      description: >-
        Record a manual book-stock correction (signed litre delta + reason +
        classification) in 'requested' state. Gated by the station-scoped
        stock.adjust at the tank's station.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestStockAdjustmentRequest' } } } }
      responses:
        '201': { description: Requested, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustment' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/stock-adjustments/{id}:
    get:
      tags: [Inventory]
      summary: Get a stock adjustment
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustment' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/stock-adjustments/{id}/approve:
    post:
      tags: [Inventory]
      summary: Approve a requested stock adjustment
      description: >-
        Moves requested -> approved. Separation of duties: the requester cannot
        approve their own adjustment (403). Gated by the station-scoped
        stock.approve_adjustment at the tank's station.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustmentDecision' } } } }
      responses:
        '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustment' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }
  /api/v1/stock-adjustments/{id}/reject:
    post:
      tags: [Inventory]
      summary: Reject a requested or approved stock adjustment
      description: >-
        Moves requested|approved -> rejected. The requester cannot decide their
        own adjustment (403). Gated by stock.approve_adjustment at the tank's
        station.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustmentDecision' } } } }
      responses:
        '200': { description: Rejected, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustment' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }
  /api/v1/stock-adjustments/{id}/post:
    post:
      tags: [Inventory]
      summary: Post an approved stock adjustment to the tank ledger
      description: >-
        Appends a single 'adjustment' movement to the tank's stock ledger and
        flips the adjustment to 'posted', linking the movement and snapshotting
        before/after book stock. Idempotent and immutable — only an 'approved'
        adjustment posts; a posted one never re-posts (409). Gated by
        stock.approve_adjustment at the tank's station.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Posted, content: { application/json: { schema: { $ref: '#/components/schemas/StockAdjustment' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }
  /api/v1/stock-transfers:
    get:
      tags: [Inventory]
      summary: List stock transfers
      parameters: [{ $ref: '#/components/parameters/LimitParam' }, { $ref: '#/components/parameters/OffsetParam' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Inventory]
      summary: Create a stock transfer
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/stock-transfers/{id}/approve:
    post:
      tags: [Inventory]
      summary: Approve a stock transfer
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }
  /api/v1/stock-transfers/{id}/receive:
    post:
      tags: [Inventory]
      summary: Receive a stock transfer
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '200': { description: Received, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }

