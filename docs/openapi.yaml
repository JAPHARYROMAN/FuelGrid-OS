      summary: List regions
      parameters: [{ in: query, name: company_id, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RegionList' } } } }
    post:
      tags: [Regions]
      summary: Create a region
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RegionCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Region' } } } }

  /api/v1/regions/{id}:
    patch:
