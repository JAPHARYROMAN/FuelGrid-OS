      summary: List a station's sales
      parameters:
        - { in: path, name: stationID, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: operating_day_id, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/shifts/{id}/sales:
    get:
      tags: [Revenue]
      summary: List a shift's sales
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/sales/{saleID}/void-requests:
    post:
      tags: [Revenue]
      summary: Request a recognized sale be voided
      description: >-
        Open a void request (requested state) against a recognized sale. The
        original sale is append-only and is never deleted or mutated; an approved
        void records a reversal instead. A sale may carry at most one non-rejected
        void at a time (409 otherwise). Gated by the station-scoped
        sale.void.request at the sale's station.
      parameters: [{ in: path, name: saleID, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestSaleVoidRequest' } } } }
      responses:
        '201': { description: Requested, content: { application/json: { schema: { $ref: '#/components/schemas/SaleVoid' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: The sale already has an active void }
  /api/v1/sales/{saleID}/void:
    get:
      tags: [Revenue]
      summary: Get a sale's current void status
      description: >-
        Returns the sale's current non-rejected void (requested or approved), or
        404 when none exists. Gated by sale.void.request at the sale's station.
      parameters: [{ in: path, name: saleID, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SaleVoid' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/sale-voids:
    get:
      tags: [Revenue]
      summary: List sale voids
      description: >-
        The void approval queue. Optionally filter by status. Gated by
        sale.void.approve.
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
        - { in: query, name: status, required: false, schema: { type: string, enum: [requested, approved, rejected] } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SaleVoidList' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/sale-voids/{id}/approve:
    post:
      tags: [Revenue]
      summary: Approve a requested sale void
      description: >-
        Moves requested -> approved and records the reversal: the sale's
        recognized amounts negated are snapshotted onto the void row, so revenue
        rollups net the reversal against the original (preserved) sale.
        Separation of duties: the requester cannot approve their own void (403).
        Idempotent — a second approve of an already-approved void is a 409. Gated
        by the station-scoped sale.void.approve at the sale's station.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/SaleVoidDecision' } } } }
      responses:
        '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/SaleVoid' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }
  /api/v1/sale-voids/{id}/reject:
    post:
      tags: [Revenue]
      summary: Reject a requested sale void
      description: >-
        Moves requested -> rejected. The requester cannot reject their own void
        (403). Gated by sale.void.approve at the sale's station.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/SaleVoidDecision' } } } }
      responses:
        '200': { description: Rejected, content: { application/json: { schema: { $ref: '#/components/schemas/SaleVoid' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }
  # ---------------------------------------------------------------------------
  # Data lifecycle & retention / governance (Feature 13.2)
  # ---------------------------------------------------------------------------
  /api/v1/retention-policies:
    get:
      tags: [Governance]
      summary: List retention policies
      description: >-
        The tenant's data-retention policies, one per scope (audit | session |
        export). Gated by retention.manage.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RetentionPolicyList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Governance]
      summary: Create a retention policy
      description: >-
        Declare a retention window for a data scope. A tenant may have at most
        one policy per scope (409 on a duplicate). Gated by retention.manage.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateRetentionPolicyRequest' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/RetentionPolicy' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: A policy already exists for this scope }
  /api/v1/retention-policies/{id}:
    patch:
      tags: [Governance]
      summary: Update a retention policy
      description: Update a policy's retention_days and/or status. Gated by retention.manage.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UpdateRetentionPolicyRequest' } } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/RetentionPolicy' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Governance]
      summary: Delete a retention policy
      description: Remove a retention policy. Gated by retention.manage.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/retention-policies/job-runs:
    get:
      tags: [Governance]
      summary: Retention-sweep job-run history
      description: >-
        Recent runs of the retention-sweep background job (when it ran, its
        terminal status, and the candidate count it found). The sweep is a
        dry-run in this slice — it does not purge. Gated by retention.manage.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, count]
                properties:
                  count: { type: integer }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/JobRun' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/closed-period-change-requests:
    get:
      tags: [Governance]
      summary: List closed-period change requests
      description: >-
        The maker-checker queue for reopening/relocking closed accounting
        periods. Optionally filter by status. Gated by closed_period.change.
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
        - { in: query, name: status, required: false, schema: { type: string, enum: [requested, approved, rejected] } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/accounting-periods/{id}/change-requests:
    post:
      tags: [Governance]
      summary: Request a closed-period change
      description: >-
        Open a change request to reopen or relock a CLOSED/LOCKED accounting
        period (422 if the period is not closed/locked). At most one pending
        request per period (409). Gated by closed_period.change.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestClosedPeriodChangeRequest' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/ClosedPeriodChangeRequest' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: A pending change request already exists for this period }
        '422': { description: The period is not closed or locked }
  /api/v1/closed-period-change-requests/{id}/approve:
    post:
      tags: [Governance]
      summary: Approve a closed-period change request
      description: >-
        Moves requested -> approved. Separation of duties: the requester cannot
        approve their own request (403). Idempotent — a second approve of a
        decided request is a 409. Approving authorizes the period transition but
        does not itself perform it. Gated by closed_period.change.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequestDecision' } } } }
      responses:
        '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/ClosedPeriodChangeRequest' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }
  /api/v1/closed-period-change-requests/{id}/reject:
    post:
      tags: [Governance]
      summary: Reject a closed-period change request
      description: >-
        Moves requested -> rejected. The requester cannot reject their own
        request (403). Gated by closed_period.change.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/ChangeRequestDecision' } } } }
      responses:
        '200': { description: Rejected, content: { application/json: { schema: { $ref: '#/components/schemas/ClosedPeriodChangeRequest' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid state transition }

  /api/v1/shifts/{id}/payments:
    get:
      tags: [Revenue]
      summary: List a shift's payments
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Revenue]
      summary: Record a shift payment
      description: >-
        Records a tender against the shift. Supply an optional Idempotency-Key
        header (or `idempotency_key` body field) to make retries safe: a replay
        carrying the same key for the tenant returns the already-recorded
        payment with 200 instead of inserting a duplicate (SR-M2).
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - in: header
          name: Idempotency-Key
          required: false
          description: >-
            Optional client-supplied dedup key (1-255 chars). A repeat request
            with the same key returns the original payment (200) rather than
            recording a second one. Tenant-scoped.
          schema: { type: string, maxLength: 255 }
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '200': { description: 'Idempotent replay — the already-recorded payment is returned unchanged', content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '201': { description: Recorded, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/shifts/{id}/payment-reconciliation:
    get:
      tags: [Revenue]
      summary: Shift payment reconciliation
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

