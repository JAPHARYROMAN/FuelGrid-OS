        station_id:       { type: string, format: uuid }
        operating_day_id: { type: string, format: uuid }
        name:             { type: string }
        status:           { type: string, enum: [open, closed, approved] }
        opened_by:        { type: string, format: uuid }
        opened_at:        { type: string, format: date-time }
        closed_by:        { type: string, format: uuid }
        closed_at:        { type: string, format: date-time }
        approved_by:      { type: string, format: uuid }
        approved_at:      { type: string, format: date-time }
        notes:            { type: string }
    ShiftList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Shift' } }
        count: { type: integer }
    ShiftAttendant:
      type: object
      properties:
        shift_id:    { type: string, format: uuid }
        user_id:     { type: string, format: uuid }
        assigned_by: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
    NozzleAssignment:
      type: object
      properties:
        id:           { type: string, format: uuid }
        shift_id:     { type: string, format: uuid }
        nozzle_id:    { type: string, format: uuid }
        attendant_id: { type: string, format: uuid }
        assigned_at:  { type: string, format: date-time }
    ShiftSummary:
      allOf:
        - $ref: '#/components/schemas/Shift'
        - type: object
          properties:
            attendants:         { type: array, items: { $ref: '#/components/schemas/ShiftAttendant' } }
            nozzle_assignments: { type: array, items: { $ref: '#/components/schemas/NozzleAssignment' } }
    ShiftDetail:
      allOf:
        - $ref: '#/components/schemas/ShiftSummary'

    MeterReading:
      type: object
      properties:
        id:            { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        shift_id:      { type: string, format: uuid }
        nozzle_id:     { type: string, format: uuid }
        reading_type:  { type: string, enum: [opening, closing] }
        reading:       { type: number }
        recorded_by:   { type: string, format: uuid }
        recorded_at:   { type: string, format: date-time }
        supersedes_id: { type: string, format: uuid }
        status:        { type: string, enum: [active, superseded] }
    MeterDispensed:
      type: object
      properties:
        nozzle_id:        { type: string, format: uuid }
        opening:          { type: number }
        closing:          { type: number }
        litres_dispensed: { type: number }
    MeterReadingList:
      type: object
      properties:
        items:     { type: array, items: { $ref: '#/components/schemas/MeterReading' } }
        count:     { type: integer }
        dispensed: { type: array, items: { $ref: '#/components/schemas/MeterDispensed' } }
    DipReading:
      type: object
      properties:
        id:            { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        shift_id:      { type: string, format: uuid }
        tank_id:       { type: string, format: uuid }
        reading_type:  { type: string, enum: [opening, closing] }
        dip_mm:        { type: number }
        volume_litres: { type: number }
        water_mm:      { type: number }
        temperature_c: { type: number }
        chart_id:      { type: string, format: uuid }
        recorded_by:   { type: string, format: uuid }
        recorded_at:   { type: string, format: date-time }
        supersedes_id: { type: string, format: uuid }
        status:        { type: string, enum: [active, superseded] }
    DipReadingList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/DipReading' } }
        count: { type: integer }

    ShiftCloseLine:
      type: object
      properties:
        nozzle_id:       { type: string, format: uuid }
        opening_reading: { type: number }
        closing_reading: { type: number }
        litres_sold:     { type: number }
        unit_price:      { type: number }
        expected_value:  { type: number }
    CashSubmission:
      type: object
      properties:
        id:                  { type: string, format: uuid }
        shift_id:            { type: string, format: uuid }
        expected_cash:       { type: number }
        cash_amount:         { type: number }
        mobile_money_amount: { type: number }
        card_amount:         { type: number }
        credit_amount:       { type: number }
        submitted_total:     { type: number }
        variance:            { type: number }
