        '200': { description: Imported, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/ap-aging:
    get:
      tags: [Payables]
      summary: Accounts-payable aging report (day-aged buckets by supplier)
      description: >
        Returns every supplier with an outstanding payable balance, split into
        day-aged buckets (current / 1-30 / 31-60 / 61-90 / 90+) computed
        server-side from each payable's invoice due date relative to today. Each
        item carries the rollup (`outstanding`, `open_count`) plus the five
        bucket amounts. The response also includes a tenant-wide `totals` row
        using the same shape (its `supplier_id` is the zero UUID). All money
        fields are decimal strings.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, count, totals]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/SupplierAging' }
                  count: { type: integer }
                  totals: { $ref: '#/components/schemas/SupplierAging' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/supplier-balances.pdf:
    get:
      tags: [Payables]
      summary: Export supplier balances (AP aging) as a branded PDF list document
      responses:
        '200': { description: PDF document, content: { application/pdf: { schema: { type: string, format: binary } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/supplier-invoices:
    get:
      tags: [Payables]
      summary: List supplier invoices
      description: >
        Returns supplier invoices in the actor's station read scope, newest
        received first. Each item is hydrated with its lines and matching
        discrepancies so a payables list can show invoiced-vs-ordered variance
        without a per-row round-trip. Optional filters narrow by station,
        supplier, purchase order, or status. Requires invoice.manage.
      parameters:
        - in: query
          name: station_id
          schema: { type: string, format: uuid }
        - in: query
          name: supplier_id
          schema: { type: string, format: uuid }
        - in: query
          name: purchase_order_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string }
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Payables]
      summary: Create a supplier invoice
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/supplier-invoices/{id}:
    get:
      tags: [Payables]
      summary: Get a supplier invoice
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/supplier-invoices/{id}/approve:
    post:
      tags: [Payables]
      summary: Approve a supplier invoice
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
