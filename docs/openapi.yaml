  # ===== Phase 11: Workforce — employees, shift teams, rotation =====
  /api/v1/stations/{stationID}/employees:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Workforce]
      summary: List a station's employees (station.read)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Workforce]
      summary: Add an employee to the station (station.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name]
              properties:
                full_name:     { type: string }
                role:          { type: string, enum: [pump_attendant, cashier, supervisor, manager, other] }
                user_id:       { type: string, format: uuid }
                employee_code: { type: string }
                phone:         { type: string }
                email:         { type: string }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
        '409': { description: An employee is already linked to that user }
  /api/v1/employees/{employeeID}:
    patch:
      tags: [Workforce]
      summary: Update an employee (station.manage)
      parameters: [{ in: path, name: employeeID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:     { type: string }
                role:          { type: string, enum: [pump_attendant, cashier, supervisor, manager, other] }
                status:        { type: string, enum: [active, inactive] }
                user_id:       { type: string, format: uuid }
                employee_code: { type: string }
                phone:         { type: string }
                email:         { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Employee not found }
  /api/v1/stations/{stationID}/teams:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Workforce]
      summary: List a station's three shift teams (station.read)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Workforce]
      summary: Ensure the station's three rotation teams exist (station.manage)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                names: { type: array, items: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
  /api/v1/teams/{teamID}/members:
    put:
      tags: [Workforce]
      summary: Replace a team's membership (station.manage)
      parameters: [{ in: path, name: teamID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_ids]
              properties:
                employee_ids: { type: array, items: { type: string, format: uuid } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Team not found }
  /api/v1/stations/{stationID}/rotation-anchor:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Workforce]
      summary: Get the station's rotation anchor date (station.read)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
    put:
      tags: [Workforce]
      summary: Set or clear the station's rotation anchor date (station.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rotation_anchor_date: { type: string, format: date, nullable: true }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
  /api/v1/stations/{stationID}/roster:
    get:
      tags: [Workforce]
      summary: Forward-looking rotation roster (station.read)
      parameters:
        - { in: path,  name: stationID, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: from,      schema: { type: string, format: date } }
        - { in: query, name: days,      schema: { type: integer, minimum: 1, maximum: 60 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
  /api/v1/stations/{stationID}/scheduled-team:
    get:
      tags: [Workforce]
      summary: The team on duty for a date + slot (station.read)
      parameters:
        - { in: path,  name: stationID, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: date,      schema: { type: string, format: date } }
        - { in: query, name: slot,      required: true, schema: { type: string, enum: [morning, evening] } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Object' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    LimitParam:
      in: query
      name: limit
      required: false
      description: Maximum number of items to return (page size).
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    OffsetParam:
      in: query
      name: offset
      required: false
      description: Number of items to skip before collecting the page.
      schema: { type: integer, minimum: 0, default: 0 }

  responses:
    BadRequest:
      description: Validation error
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unauthorized:
      description: Authentication required or invalid
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Authenticated but not authorized
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    RateLimited:
      description: Too many requests
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  schemas:
    Error:
      type: object
      properties:
        error:  { type: string }
        status: { type: integer }
    # Generic JSON object for endpoints whose payload is documented for
    # coverage but whose field-level shape is intentionally left open.
    Object:
      type: object
      additionalProperties: true
    # Standard paginated list envelope returned by the paginated list
    # endpoints: {items, count, limit, offset, has_more}. Monetary, litre,
    # and rate values inside items are decimal strings (type: string).
    Paged:
      type: object
      properties:
        items:    { type: array, items: { $ref: '#/components/schemas/Object' } }
        count:    { type: integer, description: Total matching rows (not just this page) }
        limit:    { type: integer }
        offset:   { type: integer }
        has_more: { type: boolean }
    StatusResponse:
      type: object
      properties: { status: { type: string } }
    ReadyResponse:
      type: object
      properties:
        status: { type: string }
        checks:
          type: object
          additionalProperties: { type: string }

    LoginRequest:
      type: object
      required: [tenant_slug, email, password]
      properties:
        tenant_slug: { type: string }
        email:       { type: string, format: email }
        password:    { type: string }
        mfa_code:    { type: string }
    LoginResponse:
      type: object
      properties:
        token:        { type: string }
        expires_at:   { type: string, format: date-time }
        mfa_required: { type: boolean }

    Me:
      type: object
      properties:
        user_id:       { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        session_id:    { type: string, format: uuid }
        mfa_satisfied: { type: boolean }
        mfa_enabled:   { type: boolean }
        mfa_required:  { type: boolean }
        mfa_backup_codes_remaining: { type: integer }
    MePermissions:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: object
            properties:
              code:           { type: string }
              station_scoped: { type: boolean }
        station_ids:
          type: array
          items: { type: string, format: uuid }
        tenant_wide: { type: boolean }

    Session:
      type: object
      properties:
        id:         { type: string, format: uuid }
        issued_at:  { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        user_agent: { type: string }
        is_current: { type: boolean }
    SessionList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Session' } }
        count: { type: integer }

    Company:
      type: object
      properties:
        id:              { type: string, format: uuid }
        tenant_id:       { type: string, format: uuid }
        name:            { type: string }
        legal_name:      { type: string }
        registration_no: { type: string }
        tax_id:          { type: string }
        currency:        { type: string, minLength: 3, maxLength: 3 }
        timezone:        { type: string }
        status:          { type: string }
    CompanyCreate:
      type: object
      required: [name]
      properties:
        name:            { type: string }
        legal_name:      { type: string }
        registration_no: { type: string }
        tax_id:          { type: string }
        currency:        { type: string, minLength: 3, maxLength: 3 }
        timezone:        { type: string }
    CompanyUpdate:
      type: object
      properties:
        name:            { type: string }
        legal_name:      { type: string }
        registration_no: { type: string }
        tax_id:          { type: string }
        currency:        { type: string }
        timezone:        { type: string }
        status:          { type: string }
    CompanyList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Company' } }
        count: { type: integer }

    Region:
      type: object
      properties:
        id:         { type: string, format: uuid }
        tenant_id:  { type: string, format: uuid }
        company_id: { type: string, format: uuid }
        name:       { type: string }
        code:       { type: string }
        status:     { type: string }
    RegionCreate:
      type: object
      required: [company_id, name]
      properties:
        company_id: { type: string, format: uuid }
        name:       { type: string }
        code:       { type: string }
    RegionUpdate:
      type: object
      properties:
        name:   { type: string }
        code:   { type: string }
        status: { type: string }
    RegionList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Region' } }
        count: { type: integer }

    Station:
      type: object
      properties:
        id:           { type: string, format: uuid }
        tenant_id:    { type: string, format: uuid }
        company_id:   { type: string, format: uuid }
        region_id:    { type: string, format: uuid }
        name:         { type: string }
        code:         { type: string }
        address_line1: { type: string }
        address_line2: { type: string }
        city:         { type: string }
        state:        { type: string }
        country:      { type: string }
        latitude:     { type: number, minimum: -90,  maximum: 90 }
        longitude:    { type: number, minimum: -180, maximum: 180 }
        timezone:     { type: string }
        status:       { type: string }
    StationCreate:
      type: object
      required: [company_id, name, code]
      properties:
        company_id: { type: string, format: uuid }
        region_id:  { type: string, format: uuid }
        name:       { type: string }
        code:       { type: string }
        address_line1: { type: string }
        address_line2: { type: string }
        city:       { type: string }
        state:      { type: string }
        country:    { type: string }
        latitude:   { type: number }
        longitude:  { type: number }
        timezone:   { type: string }
    StationUpdate:
      type: object
      properties:
        region_id:  { type: string, format: uuid }
        name:       { type: string }
        code:       { type: string }
        city:       { type: string }
        country:    { type: string }
        status:     { type: string }
    StationList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Station' } }
        count: { type: integer }

    User:
      type: object
      properties:
        id:            { type: string, format: uuid }
        email:         { type: string, format: email }
        full_name:     { type: string }
        status:        { type: string }
        mfa_enabled:   { type: boolean }
        last_login_at: { type: string, format: date-time }
        created_at:    { type: string, format: date-time }
        roles:         { type: array, items: { type: string } }
        station_ids:   { type: array, items: { type: string, format: uuid } }
        tenant_wide:   { type: boolean }
    UserList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/User' } }
        count: { type: integer }

    Role:
      type: object
      properties:
        id:          { type: string, format: uuid }
        code:        { type: string }
        name:        { type: string }
        description: { type: string }
        is_system:   { type: boolean }
        permissions: { type: array, items: { type: string } }
    RoleList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Role' } }
        count: { type: integer }

    AuditLog:
      type: object
      properties:
        id:             { type: string, format: uuid }
        tenant_id:      { type: string, format: uuid }
        actor_id:       { type: string, format: uuid }
        action:         { type: string }
        entity_type:    { type: string }
        entity_id:      { type: string }
        previous_value: {}
        new_value:      {}
        reason:         { type: string }
        ip:             { type: string }
        user_agent:     { type: string }
        request_id:     { type: string }
        occurred_at:    { type: string, format: date-time }
    AuditLogList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AuditLog' } }
        count: { type: integer }
        limit: { type: integer }

    StatusChange:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [active, inactive, maintenance, decommissioned] }
        reason: { type: string, description: Required when moving to maintenance or decommissioned }

    Product:
      type: object
      properties:
        id:                     { type: string, format: uuid }
        tenant_id:              { type: string, format: uuid }
        code:                   { type: string }
        name:                   { type: string }
        category:               { type: string, enum: [fuel, gas, lubricant, additive, other] }
        unit:                   { type: string, enum: [litre, kg, unit] }
        default_price:          { type: number }
        tax_rate:               { type: number }
        density_kg_m3:          { type: number }
        loss_tolerance_percent: { type: number }
        color:                  { type: string, description: Hex colour, e.g. '#f97316' }
        status:                 { type: string }
    ProductCreate:
      type: object
      required: [code, name]
      properties:
        code:                   { type: string }
        name:                   { type: string }
        category:               { type: string }
        unit:                   { type: string }
        default_price:          { type: number }
        tax_rate:               { type: number }
        density_kg_m3:          { type: number }
        loss_tolerance_percent: { type: number }
        color:                  { type: string }
    ProductUpdate:
      type: object
      properties:
        code:                   { type: string }
        name:                   { type: string }
        category:               { type: string }
        unit:                   { type: string }
        default_price:          { type: number }
        tax_rate:               { type: number }
        density_kg_m3:          { type: number }
        loss_tolerance_percent: { type: number }
        color:                  { type: string }
        status:                 { type: string }
    ProductList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Product' } }
        count: { type: integer }

    Tank:
      type: object
      properties:
        id:                { type: string, format: uuid }
        tenant_id:         { type: string, format: uuid }
        station_id:        { type: string, format: uuid }
        product_id:        { type: string, format: uuid }
        name:              { type: string }
        code:              { type: string }
        capacity_litres:   { type: number }
        safe_min_litres:   { type: number }
        safe_max_litres:   { type: number }
        dead_stock_litres: { type: number }
        has_water_sensor:  { type: boolean }
        has_temp_sensor:   { type: boolean }
        status:            { type: string }
        installation_date: { type: string, format: date }
        decommission_date: { type: string, format: date }
        current_litres:            { type: number, description: Latest dip-resolved volume; station overview only }
        current_dip_reading_type:  { type: string, enum: [opening, closing], description: Station overview only }
        current_dip_recorded_at:   { type: string, format: date-time, description: Station overview only }
        current_dip_business_date: { type: string, format: date, description: Station overview only }
    TankCreate:
      type: object
      required: [station_id, product_id, name, code, capacity_litres]
      properties:
        station_id:        { type: string, format: uuid }
        product_id:        { type: string, format: uuid }
        name:              { type: string }
        code:              { type: string }
        capacity_litres:   { type: number }
        safe_min_litres:   { type: number }
        safe_max_litres:   { type: number }
        dead_stock_litres: { type: number }
        has_water_sensor:  { type: boolean }
        has_temp_sensor:   { type: boolean }
        installation_date: { type: string, format: date }
    TankUpdate:
      type: object
      properties:
        product_id:        { type: string, format: uuid }
        name:              { type: string }
        code:              { type: string }
        capacity_litres:   { type: number }
        safe_min_litres:   { type: number }
        safe_max_litres:   { type: number }
        dead_stock_litres: { type: number }
        has_water_sensor:  { type: boolean }
        has_temp_sensor:   { type: boolean }
        installation_date: { type: string, format: date }
        decommission_date: { type: string, format: date }
    TankList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Tank' } }
        count: { type: integer }

    CalibrationChart:
      type: object
      properties:
        id:              { type: string, format: uuid }
        tenant_id:       { type: string, format: uuid }
        tank_id:         { type: string, format: uuid }
        name:            { type: string }
        effective_from:  { type: string, format: date-time }
        effective_until: { type: string, format: date-time }
        status:          { type: string, enum: [active, superseded] }
        source:          { type: string }
        entry_count:     { type: integer }
    CalibrationChartList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/CalibrationChart' } }
        count: { type: integer }
    CalibrationPreview:
      type: object
      properties:
        preview:     { type: boolean }
        entry_count: { type: integer }
        min_dip_mm:  { type: number }
        max_dip_mm:  { type: number }
        min_volume:  { type: number }
        max_volume:  { type: number }

    Pump:
      type: object
      properties:
        id:                { type: string, format: uuid }
        tenant_id:         { type: string, format: uuid }
        station_id:        { type: string, format: uuid }
        number:            { type: integer }
        name:              { type: string }
        manufacturer:      { type: string }
        model:             { type: string }
        serial_number:     { type: string }
        status:            { type: string }
        installation_date: { type: string, format: date }
    PumpCreate:
      type: object
      required: [station_id, number]
      properties:
        station_id:        { type: string, format: uuid }
        number:            { type: integer }
        name:              { type: string }
        manufacturer:      { type: string }
        model:             { type: string }
        serial_number:     { type: string }
        installation_date: { type: string, format: date }
    PumpUpdate:
      type: object
      properties:
        number:            { type: integer }
        name:              { type: string }
        manufacturer:      { type: string }
        model:             { type: string }
        serial_number:     { type: string }
        installation_date: { type: string, format: date }
    PumpList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Pump' } }
        count: { type: integer }

    PumpCalibration:
      type: object
      properties:
        id:                { type: string, format: uuid }
        tenant_id:         { type: string, format: uuid }
        pump_id:           { type: string, format: uuid }
        performed_at:      { type: string, format: date-time }
        performed_by:      { type: string, format: uuid }
        notes:             { type: string }
        tolerance_percent: { type: number }
        status:            { type: string, enum: [passed, failed, adjusted] }
    PumpCalibrationCreate:
      type: object
      properties:
        performed_at:      { type: string, format: date-time }
        notes:             { type: string }
        tolerance_percent: { type: number }
        status:            { type: string, enum: [passed, failed, adjusted] }
    PumpCalibrationList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/PumpCalibration' } }
        count: { type: integer }

    Nozzle:
      type: object
      properties:
        id:                   { type: string, format: uuid }
        tenant_id:            { type: string, format: uuid }
        station_id:           { type: string, format: uuid }
        pump_id:              { type: string, format: uuid }
        tank_id:              { type: string, format: uuid }
        product_id:           { type: string, format: uuid }
        number:               { type: integer }
        default_price:        { type: number }
        meter_decimal_places: { type: integer }
        status:               { type: string }
    NozzleCreate:
      type: object
      required: [pump_id, tank_id, number]
      properties:
        pump_id:              { type: string, format: uuid }
        tank_id:              { type: string, format: uuid }
        number:               { type: integer }
        default_price:        { type: number }
        meter_decimal_places: { type: integer }
    NozzleUpdate:
      type: object
      properties:
        tank_id:              { type: string, format: uuid }
        number:               { type: integer }
        default_price:        { type: number }
        meter_decimal_places: { type: integer }
        status:               { type: string }
    NozzleList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Nozzle' } }
        count: { type: integer }

    Incident:
      type: object
      properties:
        id:                  { type: string, format: uuid }
        tenant_id:           { type: string, format: uuid }
        station_id:          { type: string, format: uuid }
        related_entity_type: { type: string }
        related_entity_id:   { type: string, format: uuid }
        type:                { type: string, enum: [equipment, leak, variance, safety, calibration, other] }
        severity:            { type: string, enum: [low, medium, high, critical] }
        description:         { type: string }
        status:              { type: string, enum: [open, investigating, resolved, closed] }
        opened_at:           { type: string, format: date-time }
        opened_by:           { type: string, format: uuid }
        resolved_at:         { type: string, format: date-time }
        resolved_by:         { type: string, format: uuid }
    IncidentCreate:
      type: object
      required: [station_id, description]
      properties:
        station_id:          { type: string, format: uuid }
        related_entity_type: { type: string }
        related_entity_id:   { type: string, format: uuid }
        type:                { type: string }
        severity:            { type: string }
        description:         { type: string }
    IncidentList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Incident' } }
        count: { type: integer }

    Notification:
      type: object
      properties:
        id:                  { type: string, format: uuid }
        type:                { type: string }
        title:               { type: string }
        body:                { type: string }
        severity:            { type: string, enum: [info, success, warning, critical] }
        related_entity_type: { type: string }
        related_entity_id:   { type: string }
        read_at:             { type: string, format: date-time }
        created_at:          { type: string, format: date-time }
    NotificationList:
      type: object
      properties:
        items:    { type: array, items: { $ref: '#/components/schemas/Notification' } }
        count:    { type: integer }
        limit:    { type: integer }
        offset:   { type: integer }
        has_more: { type: boolean }

    PumpWithNozzles:
      allOf:
        - $ref: '#/components/schemas/Pump'
        - type: object
          properties:
            nozzles: { type: array, items: { $ref: '#/components/schemas/Nozzle' } }
    StationOverview:
      type: object
      properties:
        station:        { $ref: '#/components/schemas/Station' }
        tanks:          { type: array, items: { $ref: '#/components/schemas/Tank' } }
        pumps:          { type: array, items: { $ref: '#/components/schemas/PumpWithNozzles' } }
        open_shifts:    { type: array, items: { $ref: '#/components/schemas/ShiftSummary' } }
        open_incidents: { type: array, items: { $ref: '#/components/schemas/Incident' } }

    OperatingDay:
      type: object
      properties:
        id:            { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        station_id:    { type: string, format: uuid }
        business_date: { type: string, format: date }
        status:        { type: string, enum: [open, closed, locked] }
        opened_by:     { type: string, format: uuid }
        opened_at:     { type: string, format: date-time }
        closed_by:     { type: string, format: uuid }
        closed_at:     { type: string, format: date-time }
        locked_by:     { type: string, format: uuid }
        locked_at:     { type: string, format: date-time }
        notes:         { type: string }
    OperatingDayList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/OperatingDay' } }
        count: { type: integer }

    Shift:
      type: object
      properties:
