        tank_id:              { type: string, format: uuid }
        movement_type:        { type: string, enum: [opening, delivery, sales, adjustment, transfer] }
        source_ref_type:      { type: string }
        source_ref_id:        { type: string, format: uuid }
        litres:               { type: string, description: Exact signed decimal litres (numeric -> text) }
        balance_after:        { type: string, description: Exact decimal litres after this movement (numeric -> text) }
        supplier_id:          { type: string, format: uuid }
        purchase_order_id:    { type: string, format: uuid }
        landed_cost_total:    { type: string }
        landed_cost_per_litre: { type: string }
        status:               { type: string, enum: [posted, reversed] }
        supersedes_id:        { type: string, format: uuid }
