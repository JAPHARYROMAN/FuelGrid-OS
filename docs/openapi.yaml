        recorded_at:          { type: string, format: date-time }
        notes:                { type: string }
    StockMovementList:
      allOf:
        - $ref: '#/components/schemas/Paged'
        - type: object
          properties:
            items: { type: array, items: { $ref: '#/components/schemas/StockMovement' } }

    StockAdjustment:
      type: object
      properties:
        id:             { type: string, format: uuid }
        tank_id:        { type: string, format: uuid }
        delta_litres:   { type: string, description: Signed exact-decimal litres delta (+in / -out; numeric -> text) }
        reason:         { type: string }
        classification: { type: string, enum: [evaporation, measurement_error, theft, spillage, temperature, data_entry, other] }
        status:         { type: string, enum: [requested, approved, posted, rejected] }
        balance_before: { type: string, description: Book stock before posting (set at post; numeric -> text) }
        balance_after:  { type: string, description: Book stock after posting (set at post; numeric -> text) }
        movement_id:    { type: string, format: uuid, description: The ledger movement produced at post }
        requested_by:   { type: string, format: uuid }
        approved_by:    { type: string, format: uuid }
        posted_by:      { type: string, format: uuid }
        rejected_by:    { type: string, format: uuid }
        decision_note:  { type: string }
        requested_at:   { type: string, format: date-time }
        decided_at:     { type: string, format: date-time }
        posted_at:      { type: string, format: date-time }
    StockAdjustmentList:
      allOf:
        - $ref: '#/components/schemas/Paged'
        - type: object
          properties:
            items: { type: array, items: { $ref: '#/components/schemas/StockAdjustment' } }
    RequestStockAdjustmentRequest:
      type: object
      required: [tank_id, delta_litres, reason, classification]
      properties:
        tank_id:        { type: string, format: uuid }
        delta_litres:   { type: string, description: Signed, non-zero exact-decimal litres delta }
        reason:         { type: string }
        classification: { type: string, enum: [evaporation, measurement_error, theft, spillage, temperature, data_entry, other] }
    StockAdjustmentDecision:
      type: object
      properties:
        note: { type: string, description: Optional decision note }

    OpeningStockRequest:
      type: object
      description: >-
        An opening-stock lifecycle row (Feature 1.6): draft -> approve(lock) /
        reject. On approve the movement_id + balance_after are set (the genesis
        opening movement) and the request is locked.
      properties:
        id:            { type: string, format: uuid }
        tank_id:       { type: string, format: uuid }
        litres:        { type: string, description: Non-negative exact-decimal opening litres (numeric -> text) }
        notes:         { type: string }
        status:        { type: string, enum: [draft, approved, rejected] }
        movement_id:   { type: string, format: uuid, description: The genesis opening movement produced at approval }
        balance_after: { type: string, description: Book stock after the opening posts (set at approval; numeric -> text) }
        requested_by:  { type: string, format: uuid }
        approved_by:   { type: string, format: uuid }
        rejected_by:   { type: string, format: uuid }
        decision_note: { type: string }
        requested_at:  { type: string, format: date-time }
        decided_at:    { type: string, format: date-time }
    OpeningStockRequestList:
      allOf:
        - $ref: '#/components/schemas/Paged'
        - type: object
          properties:
            items: { type: array, items: { $ref: '#/components/schemas/OpeningStockRequest' } }
    RequestOpeningStockRequest:
      type: object
      required: [tank_id]
      properties:
        tank_id:  { type: string, format: uuid }
        litres:   { type: string, description: Non-negative exact-decimal litres; required unless from_dip is true }
        from_dip: { type: boolean, default: false }
        notes:    { type: string }

    SaleVoid:
      type: object
      description: >-
        A sale-void lifecycle row (Feature 4.3). On approve it becomes the
        reversal record: the reversal_* fields hold the sale's recognized amounts
        NEGATED (numeric -> text), present only in the 'approved' state.
      properties:
        id:              { type: string, format: uuid }
        sale_id:         { type: string, format: uuid }
        status:          { type: string, enum: [requested, approved, rejected] }
        reason:          { type: string }
        reversal_litres: { type: string, description: Sale litres negated (set on approve; numeric -> text) }
        reversal_gross:  { type: string, description: Sale gross negated (set on approve; numeric -> text) }
        reversal_tax:    { type: string, description: Sale tax negated (set on approve; numeric -> text) }
        reversal_net:    { type: string, description: Sale net negated (set on approve; numeric -> text) }
        reversal_cogs:   { type: string, description: Sale COGS negated (set on approve when costed; numeric -> text) }
        reversal_margin: { type: string, description: Sale margin negated (set on approve when costed; numeric -> text) }
        requested_by:    { type: string, format: uuid }
        decided_by:      { type: string, format: uuid }
        decision_note:   { type: string }
        requested_at:    { type: string, format: date-time }
        decided_at:      { type: string, format: date-time }
    SaleVoidList:
      allOf:
        - $ref: '#/components/schemas/Paged'
        - type: object
          properties:
            items: { type: array, items: { $ref: '#/components/schemas/SaleVoid' } }
    RequestSaleVoidRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, description: Why the sale is being voided (required) }
    SaleVoidDecision:
      type: object
      properties:
        note: { type: string, description: Optional decision note }

