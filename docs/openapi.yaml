openapi: 3.1.0
info:
  title: FuelGrid OS API
  version: 0.9.0
  description: |
    Hand-maintained spec for the FuelGrid OS API surface. Kept in
    lockstep with the Go handlers by review until Stage 11+ wires
    automatic generation from chi route metadata.

    The Stage-10 CI workflow validates this file with `redocly lint`.
    SDK regeneration is manual today — see packages/sdk/.
servers:
  - url: http://localhost:8080
    description: Local dev (`go run ./services/api/cmd/api`)

tags:
  - name: Health
    description: Liveness, readiness, and metrics
  - name: Auth
    description: Login, logout, refresh, password reset, MFA
  - name: Me
    description: Current actor's identity, permissions, sessions
  - name: Setup
    description: Tenant onboarding checklist and setup readiness
  - name: Companies
    description: Tenant CRUD over the companies hierarchy
  - name: Branding
    description: Tenant company letterhead / branding (the header on every document PDF)
  - name: Attachments
    description: Generic per-entity file attachments (PDF/PNG/JPEG, stored inline)
  - name: Regions
    description: Regions under a company
  - name: Stations
    description: Physical fueling locations
  - name: Products
    description: Per-tenant fuel product catalogue
  - name: Tanks
    description: Station tanks + status lifecycle
  - name: Calibration
    description: Tank strapping charts + dip-to-volume lookups
  - name: Pumps
    description: Dispensing units, status lifecycle, calibration events
  - name: Nozzles
    description: Nozzles bound to a pump + tank (product-consistent)
  - name: Incidents
    description: Station incident queue
  - name: Users
    description: Tenant user administration
  - name: Roles
    description: System + tenant role catalogue
  - name: Audit
    description: Append-only sensitive-action log
  - name: Admin
    description: Operational/system administration surfaces (scheduler health)
  - name: Platform
    description: Platform-admin operations (tenant provisioning)
  - name: Operating Days
    description: Per-station business-day lifecycle (open/close/lock)
  - name: Shifts
    description: Shifts, attendant + nozzle assignments, close, approval
  - name: Readings
    description: Per-shift meter + tank-dip readings (append-only)
  - name: Operations
    description: Attendant console + supervisor operations dashboard
  - name: Inventory
    description: Tank ledgers, book balances, deliveries, stock transfers
  - name: Reconciliation
    description: Tank + cash reconciliation, adjustments, sealing
  - name: Revenue
    description: Revenue days, sales, payments, payment reconciliation
  - name: Payments
    description: M-Pesa (Safaricom Daraja) mobile-money collections + reconciliation
  - name: Procurement
    description: Purchase orders, receipts, suppliers, discrepancies
  - name: Finance
    description: Chart of accounts, journals, periods, financial reports
  - name: Expenses
    description: Expense categories + the expense approval lifecycle
  - name: Petty Cash
    description: Petty-cash floats, transactions, reconciliation
  - name: Banking
    description: Bank accounts, deposits, statement import + matching
  - name: Payables
    description: Supplier invoices + payments, AP aging, payables import
  - name: Receivables
    description: Customer invoices, payments, statements, AR aging
  - name: Customers
    description: Commercial customers, contacts, credit profiles + holds
  - name: Credit
    description: Customer credit positions + credit-alert lifecycle
  - name: Pricing
    description: Station price boards, customer + central price agreements
  - name: Fleet
    description: Fleet vehicles, drivers, credentials, fuel authorizations
  - name: Risk
    description: Risk engine — signals, scores, rules, alerts, governance
  - name: Investigations
    description: Investigation case files, actions, comments, linked alerts
  - name: Approvals
    description: Approval policies + the approval-request decision flow
  - name: Enterprise
    description: Multi-station enterprise overview, groups, scope grants
  - name: Calibrated Volume
    description: Tank calibrated-volume + dip-to-volume lookups
  - name: Workforce
    description: Station employees, shift teams, and the daily 3-team rotation
  - name: Reports
    description: >-
      The reporting surface over the existing overview/service data. It spans
      three layers: (1) standard file exports — CSV, PDF, and XLSX renderings of
      the revenue, inventory, reconciliation, financials, and AR-aging reports,
      each permission-gated and audited as a 'report.exported' event with a
      content checksum; (2) deterministic, insight-bearing annotations — the
      `/insights` endpoints attach reusable, transparent data-quality warnings
      and observations to the signature reports without recomputing any figure;
      and (3) the structured, permission-aware report API — the `/reports/*`
      envelope endpoints (overview, inventory reconciliation, station close, cash
      reconciliation, fuel loss) that return a single drillable ReportEnvelope:
      headline summary, a report-specific chart payload, a generic table, the
      deterministic insights + data-quality items, recommended actions, and the
      drill-down / export affordances. Every money and litre figure is carried as
      an exact decimal string end-to-end; the unified POST /reports/export
      delegates to the existing file endpoints (which remain authoritative for
      the bytes and their own per-station gate) and audits the request.

security:
  - bearerAuth: []

paths:

  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Process is up
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusResponse' }

  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Returns 200 only when every configured backing service responds.
      security: []
      responses:
        '200': { description: Ready,     content: { application/json: { schema: { $ref: '#/components/schemas/ReadyResponse' } } } }
        '503': { description: Not ready, content: { application/json: { schema: { $ref: '#/components/schemas/ReadyResponse' } } } }

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus exposition
      description: Open in dev; gate via ingress / network policy in production.
      security: []
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain: { schema: { type: string } }

  /api/v1/platform/tenants:
    post:
      tags: [Platform]
      summary: Provision a new tenant + its first admin user
      description: >
        Requires the static PLATFORM_ADMIN_TOKEN bearer (not a user
        session). Returns a one-time password-reset token the new admin
        uses to set their password. 404 when the token is unconfigured.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, admin_email, admin_full_name]
              properties:
                name: { type: string }
                slug: { type: string }
                admin_email: { type: string, format: email }
                admin_full_name: { type: string }
      responses:
        '201':
          description: Tenant provisioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string, format: uuid }
                  tenant_slug: { type: string }
                  admin_user_id: { type: string, format: uuid }
                  admin_email: { type: string, format: email }
                  password_reset_token: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: Slug already in use }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: Token issued or MFA required, content: { application/json: { schema: { $ref: '#/components/schemas/LoginResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Extend the current session
      responses:
        '200':
          description: New expiry
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_at: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Issue a password reset token
      description: Always returns 202; never reveals whether the email matched.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_slug, email]
              properties:
                tenant_slug: { type: string }
                email: { type: string, format: email }
      responses:
        '202': { description: Request accepted }

  /api/v1/auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Redeem a reset token and set a new password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, minLength: 12 }
      responses:
        '204': { description: Password reset }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/v1/auth/mfa/enroll:
    post:
      tags: [Auth]
      summary: Begin MFA enrollment (returns secret + otpauth URL)
      responses:
        '200':
          description: Enrollment payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  otpauth_url: { type: string, format: uri }
        '409': { description: MFA already enabled }

  /api/v1/auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Confirm enrollment with a TOTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '204': { description: MFA enabled }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/me:
    get:
      tags: [Me]
      summary: Current actor
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Me' } } } }

  /api/v1/me/permissions:
    get:
      tags: [Me]
      summary: Permissions + scope for UI gating
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MePermissions' } } } }

  /api/v1/me/sessions:
    get:
      tags: [Me]
      summary: List the actor's active sessions
      parameters: [{ $ref: '#/components/parameters/LimitParam' }, { $ref: '#/components/parameters/OffsetParam' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }

  /api/v1/me/sessions/{sessionID}:
    delete:
      tags: [Me]
      summary: Revoke one of the actor's sessions
      parameters:
        - in: path
          name: sessionID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Revoked }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/me/password:
    post:
      tags: [Me]
      summary: Change the actor's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string, minLength: 12 }
      responses:
        '204': { description: Password changed }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/me/mfa/enroll:
    post:
      tags: [Me]
      summary: Begin TOTP MFA enrollment (returns secret + otpauth URI)
      responses:
        '200':
          description: Enrollment payload — render the secret/URI as a manual key or QR code
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  otpauth_url: { type: string, format: uri }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: MFA already enabled }

  /api/v1/me/mfa/confirm:
    post:
      tags: [Me]
      summary: Confirm enrollment with a TOTP code; enables MFA and returns one-time backup codes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '200':
          description: MFA enabled; backup recovery codes shown once
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes: { type: array, items: { type: string } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/me/mfa/disable:
    post:
      tags: [Me]
      summary: Disable MFA (requires a current TOTP or backup code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '204': { description: MFA disabled }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: MFA is not enabled }

  /api/v1/me/mfa/backup-codes:
    post:
      tags: [Me]
      summary: Regenerate one-time backup recovery codes (returns the fresh set once)
      responses:
        '200':
          description: Fresh backup recovery codes, shown once
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes: { type: array, items: { type: string } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: MFA is not enabled }

  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: List the caller's notification feed (own + tenant-wide)
      parameters:
        - in: query
          name: unread
          required: false
          schema: { type: string, enum: ['true'] }
          description: When 'true', return only unread notifications.
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/NotificationList' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Unread notification count for the topbar bell badge
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [unread_count]
                properties:
                  unread_count: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark one notification read (idempotent)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Marked read }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all of the caller's unread notifications read
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [marked_read]
                properties:
                  marked_read: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/preferences:
    get:
      tags: [Notifications]
      summary: List the caller's notification delivery preferences (self-service)
      description: |
        Returns the caller's own per-category/channel notification preferences
        plus the valid category and channel keys. Self-service — scoped to the
        caller's user and tenant, no permission gate beyond a session.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/NotificationPreferenceList' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [Notifications]
      summary: Create or update one notification preference toggle (self-service)
      description: |
        Upserts a single (category, channel) preference for the caller. Audited
        as notification.preference_changed. Quiet hours, when set, must be a
        complete HH:MM (24h) pair.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertNotificationPreferenceRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/NotificationPreference' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/insights:
    get:
      tags: [Risk]
      summary: List persisted deterministic insights with source-record links
      description: |
        Persisted, deterministic insights projected from risk alerts (Feature
        11.3), each linked to the immutable source record it was derived from
        (subject_type + subject_id). Read-only; gated by risk.read. Same data
        yields the same insight — the underlying alerts come from named SQL
        evaluators over immutable facts.
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
          description: Filter to insights whose alert is in this status.
        - in: query
          name: type
          required: false
          schema: { type: string }
          description: Filter to insights of this alert_type.
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/InsightList' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/jobs:
    get:
      tags: [Admin]
      summary: Latest run of every background scheduler job (admin)
      description: |
        Read-only scheduler visibility. Returns the most recent run of each
        registered background job — name, last run time, terminal status, and
        derived duration — for the admin System health page. Gated on
        `audit.read`. The job_runs ledger is cross-tenant system telemetry, so
        this endpoint takes no paging or filters; a deployment without the
        ledger table returns an empty list.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, count]
                properties:
                  count: { type: integer }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/JobRun' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/observability/health:
    get:
      tags: [Admin]
      summary: API-exposed read-only observability snapshot (admin)
      description: |
        BFF-reachable health snapshot the SDK can read (the kube probes
        `/readyz` and `/metrics` live outside `/api/v1`). Reports postgres and
        redis reachability, the tenant's outbox backlog and dead-letter counts,
        and the scheduler's most recent run. Read-only and gated on `audit.read`,
        the same permission as `/admin/jobs`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [healthy, checks, outbox]
                properties:
                  healthy: { type: boolean }
                  checks:
                    type: object
                    additionalProperties: { type: string }
                  outbox:
                    type: object
                    required: [backlog, dead_letter]
                    properties:
                      backlog: { type: integer }
                      dead_letter: { type: integer }
                  scheduler_last_run:
                    type: object
                    nullable: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/setup/checklist:
    get:
      tags: [Setup]
      summary: Tenant setup checklist with live readiness and persisted step state
      parameters:
        - in: query
          name: station_id
          required: false
          schema: { type: string, format: uuid }
          description: Restrict station-scoped readiness counts to one station.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SetupChecklist' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    patch:
      tags: [Setup]
      summary: Persist one setup checklist step status
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SetupStepPatch' } } } }
      responses:
        '200': { description: Updated checklist, content: { application/json: { schema: { $ref: '#/components/schemas/SetupChecklist' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/companies:
    get:
      tags: [Companies]
      summary: List companies
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CompanyList' } } } }
    post:
      tags: [Companies]
      summary: Create a company
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CompanyCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Company' } } } }

  /api/v1/companies/{id}:
    patch:
      tags: [Companies]
      summary: Update a company
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CompanyUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Company' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Companies]
      summary: Soft-delete a company (sets status='deleted')
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/branding:
    get:
      tags: [Branding]
      summary: Get the tenant company letterhead / branding
      description: >-
        Returns the tenant's branding text fields plus a logo-presence flag and
        a same-origin logo URL (never the bytes). Readable by any authenticated
        tenant user; the letterhead appears on every document PDF.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Branding' } } } }
    put:
      tags: [Branding]
      summary: Upsert the tenant branding text fields
      description: Requires the companies.manage permission. The logo is managed separately.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/BrandingUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Branding' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/branding/logo:
    get:
      tags: [Branding]
      summary: Stream the tenant logo
      description: Returns the stored logo with its image content type, or 404 when none is set.
      responses:
        '200':
          description: OK
          content:
            image/png: { schema: { type: string, format: binary } }
            image/jpeg: { schema: { type: string, format: binary } }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Branding]
      summary: Upload the tenant logo
      description: >-
        Multipart upload of a PNG or JPEG image, capped at 1 MiB. Requires the
        companies.manage permission. Non-image content is rejected 400; an
        oversized body is rejected 413.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Branding' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '413': { description: Image exceeds the 1 MiB size cap }
    delete:
      tags: [Branding]
      summary: Clear the tenant logo
      description: Requires the companies.manage permission. Idempotent (204 even when no logo was set).
      responses:
        '204': { description: Cleared }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/attachments:
    post:
      tags: [Attachments]
      summary: Upload an attachment for an entity
      description: >-
        Multipart upload of a PDF, PNG, or JPEG (capped at 5 MiB) attached to a
        business entity identified by entity_type + entity_id. The bytes are
        stored inline. Requires the attachment.manage permission. A relabelled
        non-allowed type is rejected 400; an oversized body is rejected 413; an
        unknown parent record is 404. Audited as attachment.added.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [entity_type, entity_id, file]
              properties:
                entity_type: { type: string, example: expense }
                entity_id: { type: string, format: uuid }
                file: { type: string, format: binary }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Attachment' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413': { description: File exceeds the 5 MiB size cap }

  /api/v1/entities/{entityType}/{entityID}/attachments:
    get:
      tags: [Attachments]
      summary: List an entity's attachments
      description: Returns the live (non-deleted) attachments for an entity, newest first. Requires the attachment.read permission.
      parameters:
        - { in: path, name: entityType, required: true, schema: { type: string } }
        - { in: path, name: entityID, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Attachment' } }
                  count: { type: integer }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/attachments/{id}:
    get:
      tags: [Attachments]
      summary: Download an attachment
      description: Streams the attachment bytes with its stored content type. Requires the attachment.read permission.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200':
          description: OK
          content:
            application/pdf: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
            image/jpeg: { schema: { type: string, format: binary } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Attachments]
      summary: Remove (soft-delete) an attachment
      description: >-
        Soft-deletes the attachment (the bytes are retained for the audit
        trail). Requires the attachment.manage permission. Refused 409 when the
        parent record is posted/locked. Audited as attachment.removed.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Removed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: The parent record is posted or locked; its attachments cannot be removed
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/v1/regions:
    get:
