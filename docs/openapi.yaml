openapi: 3.1.0
info:
  title: FuelGrid OS API
  version: 0.9.0
  description: |
    Hand-maintained spec for the FuelGrid OS API surface. Kept in
    lockstep with the Go handlers by review until Stage 11+ wires
    automatic generation from chi route metadata.

    The Stage-10 CI workflow validates this file with `redocly lint`.
    SDK regeneration is manual today — see packages/sdk/.
servers:
  - url: http://localhost:8080
    description: Local dev (`go run ./services/api/cmd/api`)

tags:
  - name: Health
    description: Liveness, readiness, and metrics
  - name: Auth
    description: Login, logout, refresh, password reset, MFA
  - name: Me
    description: Current actor's identity, permissions, sessions
  - name: Companies
    description: Tenant CRUD over the companies hierarchy
  - name: Regions
    description: Regions under a company
  - name: Stations
    description: Physical fueling locations
  - name: Products
    description: Per-tenant fuel product catalogue
  - name: Tanks
    description: Station tanks + status lifecycle
  - name: Calibration
    description: Tank strapping charts + dip-to-volume lookups
  - name: Pumps
    description: Dispensing units, status lifecycle, calibration events
  - name: Nozzles
    description: Nozzles bound to a pump + tank (product-consistent)
  - name: Incidents
    description: Station incident queue
  - name: Users
    description: Tenant user administration
  - name: Roles
    description: System + tenant role catalogue
  - name: Audit
    description: Append-only sensitive-action log
  - name: Platform
    description: Platform-admin operations (tenant provisioning)
  - name: Operating Days
    description: Per-station business-day lifecycle (open/close/lock)
  - name: Shifts
    description: Shifts, attendant + nozzle assignments, close, approval
  - name: Readings
    description: Per-shift meter + tank-dip readings (append-only)
  - name: Operations
    description: Attendant console + supervisor operations dashboard
  - name: Inventory
    description: Tank ledgers, book balances, deliveries, stock transfers
  - name: Reconciliation
    description: Tank + cash reconciliation, adjustments, sealing
  - name: Revenue
    description: Revenue days, sales, payments, payment reconciliation
  - name: Procurement
    description: Purchase orders, receipts, suppliers, discrepancies
  - name: Finance
    description: Chart of accounts, journals, periods, financial reports
  - name: Expenses
    description: Expense categories + the expense approval lifecycle
  - name: Petty Cash
    description: Petty-cash floats, transactions, reconciliation
  - name: Banking
    description: Bank accounts, deposits, statement import + matching
  - name: Payables
    description: Supplier invoices + payments, AP aging, payables import
  - name: Receivables
    description: Customer invoices, payments, statements, AR aging
  - name: Customers
    description: Commercial customers, contacts, credit profiles + holds
  - name: Credit
    description: Customer credit positions + credit-alert lifecycle
  - name: Pricing
    description: Station price boards, customer + central price agreements
  - name: Fleet
    description: Fleet vehicles, drivers, credentials, fuel authorizations
  - name: Risk
    description: Risk engine — signals, scores, rules, alerts, governance
  - name: Investigations
    description: Investigation case files, actions, comments, linked alerts
  - name: Approvals
    description: Approval policies + the approval-request decision flow
  - name: Enterprise
    description: Multi-station enterprise overview, groups, scope grants
  - name: Calibrated Volume
    description: Tank calibrated-volume + dip-to-volume lookups
  - name: Workforce
    description: Station employees, shift teams, and the daily 3-team rotation
  - name: Reports
    description: Standard report exports (CSV) over the existing overview data

security:
  - bearerAuth: []

paths:

  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Process is up
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusResponse' }

  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Returns 200 only when every configured backing service responds.
      security: []
      responses:
        '200': { description: Ready,     content: { application/json: { schema: { $ref: '#/components/schemas/ReadyResponse' } } } }
        '503': { description: Not ready, content: { application/json: { schema: { $ref: '#/components/schemas/ReadyResponse' } } } }

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus exposition
      description: Open in dev; gate via ingress / network policy in production.
      security: []
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain: { schema: { type: string } }

  /api/v1/platform/tenants:
    post:
      tags: [Platform]
      summary: Provision a new tenant + its first admin user
      description: >
        Requires the static PLATFORM_ADMIN_TOKEN bearer (not a user
        session). Returns a one-time password-reset token the new admin
        uses to set their password. 404 when the token is unconfigured.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, admin_email, admin_full_name]
              properties:
                name: { type: string }
                slug: { type: string }
                admin_email: { type: string, format: email }
                admin_full_name: { type: string }
      responses:
        '201':
          description: Tenant provisioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string, format: uuid }
                  tenant_slug: { type: string }
                  admin_user_id: { type: string, format: uuid }
                  admin_email: { type: string, format: email }
                  password_reset_token: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: Slug already in use }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200': { description: Token issued or MFA required, content: { application/json: { schema: { $ref: '#/components/schemas/LoginResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Extend the current session
      responses:
        '200':
          description: New expiry
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_at: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Issue a password reset token
      description: Always returns 202; never reveals whether the email matched.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_slug, email]
              properties:
                tenant_slug: { type: string }
                email: { type: string, format: email }
      responses:
        '202': { description: Request accepted }

  /api/v1/auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Redeem a reset token and set a new password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, minLength: 12 }
      responses:
        '204': { description: Password reset }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/v1/auth/mfa/enroll:
    post:
      tags: [Auth]
      summary: Begin MFA enrollment (returns secret + otpauth URL)
      responses:
        '200':
          description: Enrollment payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  otpauth_url: { type: string, format: uri }
        '409': { description: MFA already enabled }

  /api/v1/auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Confirm enrollment with a TOTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '204': { description: MFA enabled }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/me:
    get:
      tags: [Me]
      summary: Current actor
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Me' } } } }

  /api/v1/me/permissions:
    get:
      tags: [Me]
      summary: Permissions + scope for UI gating
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MePermissions' } } } }

  /api/v1/me/sessions:
    get:
      tags: [Me]
      summary: List the actor's active sessions
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SessionList' } } } }

  /api/v1/me/sessions/{sessionID}:
    delete:
      tags: [Me]
      summary: Revoke one of the actor's sessions
      parameters:
        - in: path
          name: sessionID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Revoked }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/me/password:
    post:
      tags: [Me]
      summary: Change the actor's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string, minLength: 12 }
      responses:
        '204': { description: Password changed }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/me/mfa/enroll:
    post:
      tags: [Me]
      summary: Begin TOTP MFA enrollment (returns secret + otpauth URI)
      responses:
        '200':
          description: Enrollment payload — render the secret/URI as a manual key or QR code
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  otpauth_url: { type: string, format: uri }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: MFA already enabled }

  /api/v1/me/mfa/confirm:
    post:
      tags: [Me]
      summary: Confirm enrollment with a TOTP code; enables MFA and returns one-time backup codes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        '200':
          description: MFA enabled; backup recovery codes shown once
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes: { type: array, items: { type: string } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/me/mfa/disable:
    post:
      tags: [Me]
      summary: Disable MFA (requires a current TOTP or backup code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '204': { description: MFA disabled }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: MFA is not enabled }

  /api/v1/me/mfa/backup-codes:
    post:
      tags: [Me]
      summary: Regenerate one-time backup recovery codes (returns the fresh set once)
      responses:
        '200':
          description: Fresh backup recovery codes, shown once
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes: { type: array, items: { type: string } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: MFA is not enabled }

  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: List the caller's notification feed (own + tenant-wide)
      parameters:
        - in: query
          name: unread
          required: false
          schema: { type: string, enum: ['true'] }
          description: When 'true', return only unread notifications.
        - in: query
          name: limit
          required: false
          schema: { type: integer }
        - in: query
          name: offset
          required: false
          schema: { type: integer }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/NotificationList' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Unread notification count for the topbar bell badge
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [unread_count]
                properties:
                  unread_count: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark one notification read (idempotent)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Marked read }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all of the caller's unread notifications read
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [marked_read]
                properties:
                  marked_read: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/companies:
    get:
      tags: [Companies]
      summary: List companies
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CompanyList' } } } }
    post:
      tags: [Companies]
      summary: Create a company
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CompanyCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Company' } } } }

  /api/v1/companies/{id}:
    patch:
      tags: [Companies]
      summary: Update a company
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CompanyUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Company' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Companies]
      summary: Soft-delete a company (sets status='deleted')
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/regions:
    get:
      tags: [Regions]
      summary: List regions
      parameters: [{ in: query, name: company_id, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RegionList' } } } }
    post:
      tags: [Regions]
      summary: Create a region
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RegionCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Region' } } } }

  /api/v1/regions/{id}:
    patch:
      tags: [Regions]
      summary: Update a region
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RegionUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Region' } } } }
    delete:
      tags: [Regions]
      summary: Soft-delete a region
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }

  /api/v1/stations:
    get:
      tags: [Stations]
      summary: List stations
      parameters: [{ in: query, name: region_id, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/StationList' } } } }
    post:
      tags: [Stations]
      summary: Create a station
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/StationCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Station' } } } }

  /api/v1/stations/{stationID}:
    get:
      tags: [Stations]
      summary: Get one station
      parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Station' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Stations]
      summary: Update a station
      parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/StationUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Station' } } } }
    delete:
      tags: [Stations]
      summary: Soft-delete a station
      parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }

  /api/v1/stations/{stationID}/overview:
    get:
      tags: [Stations]
      summary: Station dashboard overview (tanks + pumps/nozzles + open incidents)
      description: One call returning the station with its tanks, pumps (each with nested nozzles), and active incidents. Station-scoped by station.read.
      parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/StationOverview' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/products:
    get:
      tags: [Products]
      summary: List products (tenant-wide)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ProductList' } } } }
    post:
      tags: [Products]
      summary: Create a product
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ProductCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } } }
        '409': { description: Duplicate product code }

  /api/v1/products/{id}:
    get:
      tags: [Products]
      summary: Get one product
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Products]
      summary: Update a product
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ProductUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Duplicate product code }
    delete:
      tags: [Products]
      summary: Soft-delete a product
      description: 409 when live tanks still reference the product.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Product in use by tanks }

  /api/v1/tanks:
    get:
      tags: [Tanks]
      summary: List tanks (filtered to the actor's station scope)
      parameters: [{ in: query, name: station_id, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TankList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Tanks]
      summary: Create a tank
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/TankCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Tank' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station or product not found }
        '409': { description: Duplicate tank code at station }

  /api/v1/tanks/{id}:
    get:
      tags: [Tanks]
      summary: Get one tank
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Tank' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Tanks]
      summary: Update a tank (status excluded — use /status)
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/TankUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Tank' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Tanks]
      summary: Soft-delete a tank
      description: 409 when live nozzles still draw from the tank.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Tank feeds live nozzles }

  /api/v1/tanks/{id}/status:
    patch:
      tags: [Tanks]
      summary: Transition a tank's status
      description: State machine — active/inactive/maintenance interchange; decommissioned is terminal; reason required for maintenance/decommissioned.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/StatusChange' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Tank' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid transition }

  /api/v1/tanks/{id}/calibration-charts:
    get:
      tags: [Calibration]
      summary: List a tank's calibration charts
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CalibrationChartList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Calibration]
      summary: Upload a strapping-chart CSV (multipart)
      description: >
        CSV header `dip_mm,volume_litres`; strict, all-or-nothing validation
        (whole-number dips, strictly increasing dip, non-decreasing volume,
        max volume within tank capacity). `?dry_run=true` validates and
        previews without persisting. A real upload supersedes the prior
        active chart.
      parameters:
        - { in: path,  name: id,      required: true, schema: { type: string, format: uuid } }
        - { in: query, name: dry_run, schema: { type: boolean } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, name]
              properties:
                file:           { type: string, format: binary }
                name:           { type: string }
                source:         { type: string }
                effective_from: { type: string, format: date-time }
      responses:
        '200': { description: Dry-run preview, content: { application/json: { schema: { $ref: '#/components/schemas/CalibrationPreview' } } } }
        '201': { description: Chart created + activated, content: { application/json: { schema: { $ref: '#/components/schemas/CalibrationChart' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { description: Chart volume exceeds tank capacity }

  /api/v1/tanks/{id}/calibration-charts/active:
    get:
      tags: [Calibration]
      summary: Get the tank's active chart
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/CalibrationChart' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No active chart }

  /api/v1/tanks/{id}/calibrated-volume:
    get:
      tags: [Calibration]
      summary: Interpolate litres for a dip
      parameters:
        - { in: path,  name: id,     required: true, schema: { type: string, format: uuid } }
        - { in: query, name: dip_mm, required: true, schema: { type: number } }
      responses:
        '200':
          description: Interpolated volume
          content:
            application/json:
              schema:
                type: object
                properties:
                  tank_id:       { type: string, format: uuid }
                  chart_id:      { type: string, format: uuid }
                  dip_mm:        { type: number }
                  volume_litres: { type: number }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No active chart }
        '422': { description: Dip outside the chart's range }

  /api/v1/pumps:
    get:
      tags: [Pumps]
      summary: List pumps (filtered to the actor's station scope)
      parameters: [{ in: query, name: station_id, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PumpList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Pumps]
      summary: Create a pump
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PumpCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Pump' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
        '409': { description: Duplicate pump number at station }

  /api/v1/pumps/{id}:
    get:
      tags: [Pumps]
      summary: Get one pump
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Pump' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Pumps]
      summary: Update a pump (status excluded — use /status)
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PumpUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Pump' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Pumps]
      summary: Soft-delete a pump
      description: 409 when the pump still has live nozzles.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Pump has live nozzles }

  /api/v1/pumps/{id}/status:
    patch:
      tags: [Pumps]
      summary: Transition a pump's status
      description: Same state machine as tanks (decommissioned terminal; reason required for maintenance/decommissioned).
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/StatusChange' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Pump' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Invalid transition }

  /api/v1/pumps/{id}/calibrations:
    get:
      tags: [Pumps]
      summary: A pump's calibration history
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PumpCalibrationList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Pumps]
      summary: Record a calibration event
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PumpCalibrationCreate' } } } }
      responses:
        '201': { description: Recorded, content: { application/json: { schema: { $ref: '#/components/schemas/PumpCalibration' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/nozzles:
    get:
      tags: [Nozzles]
      summary: List nozzles (filtered to the actor's station scope)
      parameters:
        - { in: query, name: station_id, schema: { type: string, format: uuid } }
        - { in: query, name: pump_id,    schema: { type: string, format: uuid } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/NozzleList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Nozzles]
      summary: Create a nozzle
      description: station + product are derived from the chosen tank; price defaults to the product's default price.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/NozzleCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Nozzle' } } } }
        '400': { description: Pump and tank at different stations }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Pump or tank not found }
        '409': { description: Duplicate nozzle number on pump }

  /api/v1/nozzles/{id}:
    patch:
      tags: [Nozzles]
      summary: Update a nozzle
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/NozzleUpdate' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Nozzle' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Nozzles]
      summary: Soft-delete a nozzle
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/incidents:
    get:
      tags: [Incidents]
      summary: List incidents (filtered to the actor's station scope)
      parameters:
        - { in: query, name: station_id, schema: { type: string, format: uuid } }
        - { in: query, name: status,     schema: { type: string, enum: [open, investigating, resolved, closed] } }
        - { in: query, name: severity,   schema: { type: string, enum: [low, medium, high, critical] } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/IncidentList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Incidents]
      summary: Open an incident
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/IncidentCreate' } } } }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Incident' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }

  /api/v1/incidents/{id}/status:
    patch:
      tags: [Incidents]
      summary: Transition an incident's status
      description: Moving to resolved/closed stamps resolved_at/by.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, investigating, resolved, closed] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Incident' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/users:
    get:
      tags: [Users]
      summary: List tenant users with roles + station scope
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/UserList' } } } }

  /api/v1/admin/users:
    post:
      tags: [Users]
      summary: Invite a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, full_name]
              properties:
                email: { type: string, format: email }
                full_name: { type: string }
      responses:
        '201': { description: Invited }

  /api/v1/admin/users/{userID}/status:
    patch:
      tags: [Users]
      summary: Update a user's status (active|suspended)
      parameters: [{ in: path, name: userID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, suspended] }
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/users/{userID}/roles:
    post:
      tags: [Users]
      summary: Grant a system role
      parameters: [{ in: path, name: userID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_code]
              properties:
                role_code: { type: string }
      responses:
        '201': { description: Granted }

  /api/v1/admin/users/{userID}/roles/{roleCode}:
    delete:
      tags: [Users]
      summary: Revoke a role
      parameters:
        - { in: path, name: userID,   required: true, schema: { type: string, format: uuid } }
        - { in: path, name: roleCode, required: true, schema: { type: string } }
      responses:
        '204': { description: Revoked }

  /api/v1/admin/users/{userID}/station-access:
    post:
      tags: [Users]
      summary: Grant explicit access to one station
      parameters: [{ in: path, name: userID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [station_id]
              properties:
                station_id: { type: string, format: uuid }
      responses:
        '201': { description: Granted }

  /api/v1/admin/users/{userID}/station-access/{stationID}:
    delete:
      tags: [Users]
      summary: Revoke station access
      parameters:
        - { in: path, name: userID,    required: true, schema: { type: string, format: uuid } }
        - { in: path, name: stationID, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Revoked }

  /api/v1/roles:
    get:
      tags: [Roles]
      summary: System + tenant roles with permission codes
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RoleList' } } } }

  /api/v1/audit-logs:
    get:
      tags: [Audit]
      summary: Filtered audit log
      parameters:
        - { in: query, name: action,      schema: { type: string } }
        - { in: query, name: entity_type, schema: { type: string } }
        - { in: query, name: entity_id,   schema: { type: string } }
        - { in: query, name: actor_id,    schema: { type: string, format: uuid } }
        - { in: query, name: since,       schema: { type: string, format: date-time } }
        - { in: query, name: until,       schema: { type: string, format: date-time } }
        - { in: query, name: limit,       schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AuditLogList' } } } }

  /api/v1/me/active-shift:
    get:
      tags: [Operations]
      summary: The actor's own current shift + assigned nozzles
      description: Self-scoped attendant console feed; returns only shifts the actor is an attendant on. Authentication alone, no station permission.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MyShift' } } } }

  /api/v1/stations/{stationID}/operating-days:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Operating Days]
      summary: List a station's operating days
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDayList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Operating Days]
      summary: Open an operating day (operations.manage_day)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                business_date: { type: string, format: date, description: Defaults to today (UTC) }
                notes:         { type: string }
      responses:
        '201': { description: Opened, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDay' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
        '409': { description: A day is already open for that date }

  /api/v1/operating-days/{id}:
    get:
      tags: [Operating Days]
      summary: Get an operating day
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDay' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/operating-days/{id}/status:
    patch:
      tags: [Operating Days]
      summary: Close or reopen a day (operations.manage_day)
      description: closed requires no open shifts. open reopens a closed day (audited operating_day.reopened); a locked day cannot change status.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, closed] }
                reason: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDay' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Locked day, already in state, or open shifts block close }

  /api/v1/operating-days/{id}/lock:
    patch:
      tags: [Operating Days]
      summary: Lock a closed day (operations.manage_day)
      description: Terminal. Rejected until every shift in the day is approved.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        content: { application/json: { schema: { type: object, properties: { reason: { type: string } } } } }
      responses:
        '200': { description: Locked, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDay' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Day not closed, or unapproved shifts remain }

  /api/v1/stations/{stationID}/shifts:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Shifts]
      summary: List a station's shifts
      parameters: [{ in: query, name: operating_day_id, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Shifts]
      summary: Open a shift in a day (shift.open)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operating_day_id, name, slot]
              properties:
                operating_day_id: { type: string, format: uuid }
                name:             { type: string }
                slot:             { type: string, enum: [morning, evening] }
                notes:            { type: string }
      responses:
        '201': { description: Opened, content: { application/json: { schema: { $ref: '#/components/schemas/Shift' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Operating day is not open }

  /api/v1/shifts/{id}:
    get:
      tags: [Shifts]
      summary: Get a shift with attendants + nozzle assignments
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftDetail' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/attendants:
    post:
      tags: [Shifts]
      summary: Assign an attendant to the shift (shift.assign)
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [user_id], properties: { user_id: { type: string, format: uuid } } }
      responses:
        '201': { description: Assigned }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Shift or user not found }
        '409': { description: Already on the shift }

  /api/v1/shifts/{id}/attendants/{userID}:
    delete:
      tags: [Shifts]
      summary: Unassign an attendant (cascades their nozzle assignments)
      parameters:
        - { in: path, name: id,     required: true, schema: { type: string, format: uuid } }
        - { in: path, name: userID, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Unassigned }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/nozzle-assignments:
    post:
      tags: [Shifts]
      summary: Assign a nozzle to an attendant on the shift (shift.assign)
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nozzle_id, attendant_id]
              properties:
                nozzle_id:    { type: string, format: uuid }
                attendant_id: { type: string, format: uuid }
      responses:
        '201': { description: Assigned, content: { application/json: { schema: { $ref: '#/components/schemas/NozzleAssignment' } } } }
        '400': { description: Nozzle at a different station, or attendant not on the shift }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Nozzle already assigned on the shift }

  /api/v1/shifts/{id}/nozzle-assignments/{assignmentID}:
    delete:
      tags: [Shifts]
      summary: Remove a nozzle assignment (shift.assign)
      parameters:
        - { in: path, name: id,           required: true, schema: { type: string, format: uuid } }
        - { in: path, name: assignmentID, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Removed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/meter-readings:
    parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Readings]
      summary: List active meter readings + computed litres dispensed
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MeterReadingList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Readings]
      summary: Capture an opening/closing meter reading
      description: Attendants (reading.edit) are self-scoped to their assigned nozzles; supervisors (reading.override) may write any nozzle on the shift. Open shift only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nozzle_id, reading_type, reading]
              properties:
                nozzle_id:    { type: string, format: uuid }
                reading_type: { type: string, enum: [opening, closing] }
                reading:      { type: number }
      responses:
        '201': { description: Captured, content: { application/json: { schema: { $ref: '#/components/schemas/MeterReading' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { description: Not assigned to this shift/nozzle }
        '409': { description: A reading of that type already exists; correct it instead }
        '422': { description: Decimal scale exceeds the nozzle's meter precision, or nozzle not assigned on the shift }

  /api/v1/shifts/{id}/meter-readings/{readingID}/correct:
    post:
      tags: [Readings]
      summary: Supersede a meter reading (open shift only)
      parameters:
        - { in: path, name: id,        required: true, schema: { type: string, format: uuid } }
        - { in: path, name: readingID, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [reading], properties: { reading: { type: number } } }
      responses:
        '200': { description: Corrected, content: { application/json: { schema: { $ref: '#/components/schemas/MeterReading' } } } }
        '403': { description: Not assigned to this shift/nozzle }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Shift is not open (corrections lock at close), or reading already superseded }

  /api/v1/shifts/{id}/dip-readings:
    parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Readings]
      summary: List active tank dip readings (resolved volumes)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DipReadingList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Readings]
      summary: Capture an opening/closing dip (volume resolved server-side)
      description: Volume + chart_id are snapshotted from the tank's active calibration chart. Self-scoped like meter capture (reading.edit / reading.override). Open shift only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tank_id, reading_type, dip_mm]
              properties:
                tank_id:       { type: string, format: uuid }
                reading_type:  { type: string, enum: [opening, closing] }
                dip_mm:        { type: number }
                water_mm:      { type: number }
                temperature_c: { type: number }
      responses:
        '201': { description: Captured, content: { application/json: { schema: { $ref: '#/components/schemas/DipReading' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { description: No assigned nozzle draws from this tank on the shift }
        '409': { description: Tank has no active chart, or a dip of that type exists }
        '422': { description: Dip outside the chart's range, or tank not assigned on the shift }

  /api/v1/shifts/{id}/dip-readings/{readingID}/correct:
    post:
      tags: [Readings]
      summary: Supersede a dip reading (open shift only)
      parameters:
        - { in: path, name: id,        required: true, schema: { type: string, format: uuid } }
        - { in: path, name: readingID, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dip_mm]
              properties:
                dip_mm:        { type: number }
                water_mm:      { type: number }
                temperature_c: { type: number }
      responses:
        '200': { description: Corrected, content: { application/json: { schema: { $ref: '#/components/schemas/DipReading' } } } }
        '403': { description: No assigned nozzle draws from this tank on the shift }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Shift is not open, or reading already superseded }

  /api/v1/shifts/{id}/close:
    post:
      tags: [Shifts]
      summary: Close a shift (shift.close)
      description: Requires opening+closing meter for every assigned nozzle and a closing dip for every tank behind them. Snapshots per-nozzle close lines and expected cash.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Closed, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftCloseSummary' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Shift is not open }
        '422': { description: No nozzle assignments, or missing/rolled-back readings (lists the offending ids) }

  /api/v1/shifts/{id}/close-summary:
    get:
      tags: [Shifts]
      summary: Close lines + expected cash + cash submission
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftCloseSummary' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/cash-submission:
    post:
      tags: [Shifts]
      summary: Submit the cash tender breakdown for a closed shift
      description: Attendants (cash.submit) submit only for shifts they're on; supervisors (cash.override) for any. Variance over threshold auto-raises a blocking exception.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cash_amount]
              properties:
                cash_amount:         { type: number }
                mobile_money_amount: { type: number }
                card_amount:         { type: number }
                credit_amount:       { type: number }
                notes:               { type: string }
      responses:
        '201': { description: Submitted, content: { application/json: { schema: { $ref: '#/components/schemas/CashSubmission' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { description: Not assigned to this shift }
        '409': { description: Shift not closed, or cash already submitted }

  /api/v1/shifts/{id}/status:
    patch:
      tags: [Shifts]
      summary: Approve a closed shift (shift.approve)
      description: Refused while the shift has open exceptions. Close is via POST /close, not here.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [status], properties: { status: { type: string, enum: [approved] } } }
      responses:
        '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/Shift' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Shift not closed, or open exceptions remain }

  /api/v1/shifts/{id}/exceptions:
