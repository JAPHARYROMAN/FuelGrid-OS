  /api/v1/incidents/{id}/status:
    patch:
      tags: [Incidents]
      summary: Transition an incident's status
      description: Moving to resolved/closed stamps resolved_at/by.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, investigating, resolved, closed] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Incident' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/users:
    get:
      tags: [Users]
      summary: List tenant users with roles + station scope
      parameters: [{ $ref: '#/components/parameters/LimitParam' }, { $ref: '#/components/parameters/OffsetParam' }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Paged' } } } }

  /api/v1/admin/users:
    post:
      tags: [Users]
      summary: Invite a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, full_name]
              properties:
                email: { type: string, format: email }
                full_name: { type: string }
      responses:
        '201': { description: Invited }

  /api/v1/admin/users/{userID}/status:
    patch:
      tags: [Users]
      summary: Update a user's status (active|suspended)
      parameters: [{ in: path, name: userID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, suspended] }
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/users/{userID}/roles:
    post:
      tags: [Users]
      summary: Grant a system role
      parameters: [{ in: path, name: userID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_code]
              properties:
                role_code: { type: string }
      responses:
        '201': { description: Granted }

  /api/v1/admin/users/{userID}/roles/{roleCode}:
    delete:
      tags: [Users]
      summary: Revoke a role
      parameters:
        - { in: path, name: userID,   required: true, schema: { type: string, format: uuid } }
        - { in: path, name: roleCode, required: true, schema: { type: string } }
      responses:
        '204': { description: Revoked }

  /api/v1/admin/users/{userID}/station-access:
    post:
      tags: [Users]
      summary: Grant explicit access to one station
      parameters: [{ in: path, name: userID, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [station_id]
              properties:
                station_id: { type: string, format: uuid }
      responses:
        '201': { description: Granted }

  /api/v1/admin/users/{userID}/station-access/{stationID}:
    delete:
      tags: [Users]
      summary: Revoke station access
      parameters:
        - { in: path, name: userID,    required: true, schema: { type: string, format: uuid } }
        - { in: path, name: stationID, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Revoked }

  /api/v1/roles:
    get:
      tags: [Roles]
      summary: System + tenant roles with permission codes
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/RoleList' } } } }

  /api/v1/audit-logs:
    get:
      tags: [Audit]
      summary: Filtered audit log
      parameters:
        - { in: query, name: action,      schema: { type: string } }
        - { in: query, name: entity_type, schema: { type: string } }
        - { in: query, name: entity_id,   schema: { type: string } }
        - { in: query, name: actor_id,    schema: { type: string, format: uuid } }
        - { in: query, name: since,       schema: { type: string, format: date-time } }
        - { in: query, name: until,       schema: { type: string, format: date-time } }
        - { in: query, name: limit,       schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AuditLogList' } } } }

  /api/v1/me/active-shift:
    get:
      tags: [Operations]
      summary: The actor's own current shift + assigned nozzles
      description: Self-scoped attendant console feed; returns only shifts the actor is an attendant on. Authentication alone, no station permission.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MyShift' } } } }

  /api/v1/attendant/current-shift:
    get:
      tags: [Operations]
      summary: The attendant's workflow snapshot with a computed next_action (self-scoped)
      description: Mobile Attendant App home feed (Phase 1). Resolves the actor's current non-approved shift via roster membership (falling back to a shift approved today, then to their 3-team rotation duty for today) and returns one snapshot — station, shift or expected-today info, attendance, the actor's own nozzle assignments with confirmation state, meter readings with per-closing verification status (exact decimal strings), cash submission + collection receipt, and a computed next_action with a plain-English user_message. blocked carries a machine-readable blocking_code. open_shift is reserved (supervisors open shifts; an expected-but-unopened duty day reports await_shift_open). Authentication alone, no station permission.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AttendantCurrentShift' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/stations/{stationID}/operating-days:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Operating Days]
      summary: List a station's operating days
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDayList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Operating Days]
      summary: Open an operating day (operations.manage_day)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                business_date: { type: string, format: date, description: Defaults to today (UTC) }
                notes:         { type: string }
      responses:
        '201': { description: Opened, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDay' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Station not found }
        '409': { description: A day is already open for that date }

  /api/v1/operating-days/{id}:
    get:
      tags: [Operating Days]
      summary: Get an operating day
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDay' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/operating-days/{id}/status:
    patch:
      tags: [Operating Days]
      summary: Close or reopen a day (operations.manage_day)
      description: closed requires no open shifts. open reopens a closed day (audited operating_day.reopened); a locked day cannot change status.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, closed] }
                reason: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDay' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Locked day, already in state, or open shifts block close }

  /api/v1/operating-days/{id}/lock:
    patch:
      tags: [Operating Days]
      summary: Lock a closed day (operations.manage_day)
      description: Terminal. Rejected until every shift in the day is approved.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        content: { application/json: { schema: { type: object, properties: { reason: { type: string } } } } }
      responses:
        '200': { description: Locked, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingDay' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Day not closed, or unapproved shifts remain }

  /api/v1/stations/{stationID}/shifts:
    parameters: [{ in: path, name: stationID, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Shifts]
      summary: List a station's shifts
      parameters: [{ in: query, name: operating_day_id, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Shifts]
      summary: Open a shift in a day (shift.open)
      description: Handover chain (Mobile Attendant Phase 0) — a 409 with code prior_shift_unapproved is returned while any prior shift at the station is closed-but-not-approved; a shift.approve holder may override with handover_override_reason (audited).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operating_day_id, name, slot]
              properties:
                operating_day_id: { type: string, format: uuid }
                name:             { type: string }
                slot:             { type: string, enum: [morning, evening] }
                notes:            { type: string }
                handover_override_reason: { type: string, description: Open despite a closed-but-not-approved prior shift (shift.approve holders only; audited) }
      responses:
        '201': { description: Opened, content: { application/json: { schema: { $ref: '#/components/schemas/Shift' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Operating day is not open, station setup incomplete, or a prior shift is closed-but-not-approved (code prior_shift_unapproved + unapproved_shift_ids) }

  /api/v1/shifts/{id}:
    get:
      tags: [Shifts]
      summary: Get a shift with attendants + nozzle assignments
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftDetail' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/attendants:
    post:
      tags: [Shifts]
      summary: Assign an attendant to the shift (shift.assign)
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [user_id], properties: { user_id: { type: string, format: uuid } } }
      responses:
        '201': { description: Assigned }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Shift or user not found }
        '409': { description: Already on the shift }

  /api/v1/shifts/{id}/attendants/{userID}:
    delete:
      tags: [Shifts]
      summary: Unassign an attendant (cascades their nozzle assignments)
      parameters:
        - { in: path, name: id,     required: true, schema: { type: string, format: uuid } }
        - { in: path, name: userID, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Unassigned }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/nozzle-assignments:
    post:
      tags: [Shifts]
      summary: Assign a nozzle to an attendant on the shift (shift.assign)
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nozzle_id, attendant_id]
              properties:
                nozzle_id:    { type: string, format: uuid }
                attendant_id: { type: string, format: uuid }
      responses:
        '201': { description: Assigned, content: { application/json: { schema: { $ref: '#/components/schemas/NozzleAssignment' } } } }
        '400': { description: Nozzle at a different station, or attendant not on the shift }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Nozzle already assigned on the shift }

  /api/v1/shifts/{id}/nozzle-assignments/{assignmentID}:
    delete:
      tags: [Shifts]
      summary: Remove a nozzle assignment (shift.assign)
      parameters:
        - { in: path, name: id,           required: true, schema: { type: string, format: uuid } }
        - { in: path, name: assignmentID, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Removed }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/meter-readings:
    parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Readings]
      summary: List active meter readings + computed litres dispensed
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MeterReadingList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Readings]
      summary: Capture an opening/closing meter reading
      description: Attendants (reading.edit) are self-scoped to their assigned nozzles; supervisors (reading.override) may write any nozzle on the shift. Open shift only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nozzle_id, reading_type, reading]
              properties:
                nozzle_id:    { type: string, format: uuid }
                reading_type: { type: string, enum: [opening, closing] }
                reading:      { type: number }
      responses:
        '201': { description: Captured, content: { application/json: { schema: { $ref: '#/components/schemas/MeterReading' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { description: Not assigned to this shift/nozzle }
        '409': { description: A reading of that type already exists. For an opening, correct it instead; a duplicate closing carries code closing_already_submitted — the submission lock, corrections go through supervisor verification }
        '422': { description: Decimal scale exceeds the nozzle's meter precision, nozzle not assigned on the shift, or an opening below the previous shift's approved closing (code opening_below_expected + expected_opening_reading) }

  /api/v1/shifts/{id}/meter-readings/{readingID}/correct:
    post:
      tags: [Readings]
      summary: Supersede a meter reading (open shift only)
      parameters:
        - { in: path, name: id,        required: true, schema: { type: string, format: uuid } }
        - { in: path, name: readingID, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [reading], properties: { reading: { type: number } } }
      responses:
        '200': { description: Corrected, content: { application/json: { schema: { $ref: '#/components/schemas/MeterReading' } } } }
        '403': { description: Not assigned to this shift/nozzle }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Shift is not open (corrections lock at close), reading already superseded, or an attendant correcting their own submitted closing (code closing_already_submitted — supervisor verification handles corrections) }

  /api/v1/shifts/{id}/dip-readings:
    parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Readings]
      summary: List active tank dip readings (resolved volumes)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DipReadingList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Readings]
      summary: Capture an opening/closing dip (volume resolved server-side)
      description: Volume + chart_id are snapshotted from the tank's active calibration chart. Self-scoped like meter capture (reading.edit / reading.override). Open shift only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tank_id, reading_type, dip_mm]
              properties:
                tank_id:       { type: string, format: uuid }
                reading_type:  { type: string, enum: [opening, closing] }
                dip_mm:        { type: number }
                water_mm:      { type: number }
                temperature_c: { type: number }
      responses:
        '201': { description: Captured, content: { application/json: { schema: { $ref: '#/components/schemas/DipReading' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { description: No assigned nozzle draws from this tank on the shift }
        '409': { description: Tank has no active chart, or a dip of that type exists }
        '422': { description: Dip outside the chart's range, or tank not assigned on the shift }

  /api/v1/shifts/{id}/dip-readings/{readingID}/correct:
    post:
      tags: [Readings]
      summary: Supersede a dip reading (open shift only)
      parameters:
        - { in: path, name: id,        required: true, schema: { type: string, format: uuid } }
        - { in: path, name: readingID, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dip_mm]
              properties:
                dip_mm:        { type: number }
                water_mm:      { type: number }
                temperature_c: { type: number }
      responses:
        '200': { description: Corrected, content: { application/json: { schema: { $ref: '#/components/schemas/DipReading' } } } }
        '403': { description: No assigned nozzle draws from this tank on the shift }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Shift is not open, or reading already superseded }

  /api/v1/shifts/{id}/close:
    post:
      tags: [Shifts]
      summary: Close a shift (shift.close)
      description: Requires opening+closing meter for every assigned nozzle and a closing dip for every tank behind them. Snapshots per-nozzle close lines and expected cash.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Closed, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftCloseSummary' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Shift is not open }
        '422': { description: No nozzle assignments, or missing/rolled-back readings (lists the offending ids) }

  /api/v1/shifts/{id}/close-summary:
    get:
      tags: [Shifts]
      summary: Close lines + expected cash + cash submission
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftCloseSummary' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/cash-submission:
    post:
      tags: [Shifts]
      summary: Submit the cash tender breakdown for a closed shift
      description: Attendants (cash.submit) submit only for shifts they're on; supervisors (cash.override) for any. Variance over threshold auto-raises a blocking exception.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cash_amount]
              properties:
                cash_amount:         { type: number }
                mobile_money_amount: { type: number }
                card_amount:         { type: number }
                credit_amount:       { type: number }
                notes:               { type: string }
      responses:
        '201': { description: Submitted, content: { application/json: { schema: { $ref: '#/components/schemas/CashSubmission' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { description: Not assigned to this shift }
        '409': { description: Shift not closed, or cash already submitted }

  /api/v1/shifts/{id}/status:
    patch:
      tags: [Shifts]
      summary: Approve a closed shift (shift.approve)
      description: Refused while the shift has open exceptions, unverified closing readings (code readings_unverified), or a cash submission without a collection receipt (code collection_unconfirmed). Close is via POST /close, not here.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [status], properties: { status: { type: string, enum: [approved] } } }
      responses:
        '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/Shift' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Shift not closed, open exceptions remain, closing readings unverified (code readings_unverified), or the cash submission is unconfirmed (code collection_unconfirmed) }

  /api/v1/shifts/{id}/exceptions:
    get:
      tags: [Shifts]
      summary: List a shift's exceptions
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftExceptionList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/check-in:
    post:
      tags: [Shifts]
      summary: Check in to a shift you are rostered on (self-scoped)
      description: The actor must be on the shift's attendant roster (403 otherwise). Idempotent — a repeat check-in returns the existing record with 200.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                device_info: { type: object, additionalProperties: true }
      responses:
        '200': { description: Already checked in (idempotent), content: { application/json: { schema: { $ref: '#/components/schemas/ShiftAttendance' } } } }
        '201': { description: Checked in, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftAttendance' } } } }
        '403': { description: Not assigned to this shift }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Shift is not open }

  /api/v1/shifts/{id}/check-out:
    post:
      tags: [Shifts]
      summary: Check out of a shift you checked in to (self-scoped)
      description: Idempotent — a repeat check-out returns the existing record. Checking out without a prior check-in is a 409.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Checked out, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftAttendance' } } } }
        '403': { description: Not assigned to this shift }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Never checked in }

  /api/v1/shifts/{id}/attendance:
    get:
      tags: [Shifts]
      summary: List a shift's check-in/out records (station.read)
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ShiftAttendanceList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/nozzle-assignments/{assignmentID}/confirm:
    post:
      tags: [Shifts]
      summary: Confirm your own nozzle assignment (self-scoped)
      description: Only the assigned attendant may confirm (403 otherwise). Idempotent — confirming again returns the original confirmation timestamp. A reassignment recreates the row, clearing the confirmation.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: assignmentID, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Confirmed, content: { application/json: { schema: { $ref: '#/components/schemas/ConfirmedNozzleAssignment' } } } }
        '403': { description: Not the assigned attendant }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Shift is not open }

  /api/v1/shifts/{id}/readings/verify:
    post:
      tags: [Shifts]
      summary: Batch-approve every closing reading as-is (reading.override)
      description: Inserts an approved verification (final = submitted) for every ACTIVE closing reading that has none, preserving the attendant's original submission forever. Idempotent. Separation of duties — refused when the batch contains a reading the actor recorded.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ReadingVerificationList' } } } }
        '403': { description: Missing reading.override, or self-verification }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/shifts/{id}/readings/{readingID}/verify-correct:
    post:
      tags: [Shifts]
      summary: Verify a closing reading with a corrected figure (reading.override)
      description: Dual-value model — the meter reading is never mutated; the verification stores the attendant's submission AND the supervisor's figure (final = supervisor's). Reason mandatory. On a closed shift the frozen close line is recomputed in the same transaction.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: readingID, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verified_reading, reason]
              properties:
                verified_reading: { type: string, description: Exact decimal string (numeric 14,3) }
                reason: { type: string }
      responses:
        '201': { description: Corrected, content: { application/json: { schema: { $ref: '#/components/schemas/ReadingVerification' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { description: Missing reading.override, or self-verification }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Reading already verified, superseded, or shift approved }
        '422': { description: Not a closing reading, precision exceeded, or below opening }

  /api/v1/shifts/{id}/cash-submission/confirm:
    post:
      tags: [Shifts]
      summary: Confirm receipt of the shift's cash submission (cash.confirm)
      description: Records the supervisor's collection receipt for a closed shift's cash submission — snapshots expected + submitted, the received total, and the difference (received − expected, SQL numeric). Separation of duties — the receiver must not be the submitter. A reason is required when the difference is non-zero or the handover is rejected. Shift approval is gated on a non-rejected receipt.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [received_total]
              properties:
                received_total: { type: string, description: Exact decimal string (numeric 14,2) of the cash physically received }
                status: { type: string, enum: [received, rejected], description: Defaults to received; a non-zero difference upgrades to approved_with_difference server-side }
                reason: { type: string, description: Required when the difference is non-zero or the handover is rejected }
                supervisor_comment: { type: string }
      responses:
        '201': { description: Confirmed, content: { application/json: { schema: { $ref: '#/components/schemas/CollectionReceipt' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { description: Missing cash.confirm, or the receiver is the submitter (separation of duties) }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Shift not closed, no cash submission yet, or already confirmed }

  /api/v1/shifts/{id}/expected-opening-readings:
    get:
      tags: [Shifts]
      summary: Per assigned nozzle, the expected opening meter (handover chain)
      description: The previous shift's final approved closing per nozzle — the reading verification's final_approved_reading when the closing was verified, the raw closing otherwise; empty when the nozzle has no prior closing at the station. Readable by the shift's attendants (self-scoped) or station.read holders.
      parameters: [{ in: path, name: id, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ExpectedOpeningReadingList' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

