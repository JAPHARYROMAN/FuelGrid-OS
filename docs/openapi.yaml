        submitted_at:        { type: string, format: date-time }
        notes:               { type: string }
    ShiftCloseSummary:
      type: object
      properties:
        shift:           { $ref: '#/components/schemas/Shift' }
        lines:           { type: array, items: { $ref: '#/components/schemas/ShiftCloseLine' } }
        expected_cash:   { type: number }
        cash_submission: { oneOf: [{ $ref: '#/components/schemas/CashSubmission' }, { type: 'null' }] }
    ShiftException:
      type: object
      properties:
        id:          { type: string, format: uuid }
        tenant_id:   { type: string, format: uuid }
        shift_id:    { type: string, format: uuid }
        type:        { type: string, enum: [missing_reading, cash_variance, meter_rollback, late_close, other] }
        severity:    { type: string }
        detail:      { type: string }
        status:      { type: string, enum: [open, resolved] }
        raised_at:   { type: string, format: date-time }
        resolved_by: { type: string, format: uuid }
        resolved_at: { type: string, format: date-time }
    ShiftExceptionList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ShiftException' } }
        count: { type: integer }

    MyShiftNozzle:
      type: object
      properties:
        nozzle_id:            { type: string, format: uuid }
        pump_number:          { type: integer }
        nozzle_number:        { type: integer }
        product_name:         { type: string }
        product_color:        { type: string }
        tank_id:              { type: string, format: uuid }
        tank_code:            { type: string }
        default_price:        { type: number }
        meter_decimal_places: { type: integer }
        opening_reading:      { type: number }
        closing_reading:      { type: number }
    MyShiftTank:
      type: object
      properties:
        tank_id:               { type: string, format: uuid }
