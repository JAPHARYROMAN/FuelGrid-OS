      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/StationOverview' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/products:
