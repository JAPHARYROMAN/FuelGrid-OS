        pump_id:              { type: string, format: uuid }
        tank_id:              { type: string, format: uuid }
        number:               { type: integer }
        default_price:        { type: number }
        meter_decimal_places: { type: integer }
    NozzleUpdate:
      type: object
      properties:
        tank_id:              { type: string, format: uuid }
        number:               { type: integer }
        default_price:        { type: number }
        meter_decimal_places: { type: integer }
        status:               { type: string }
    NozzleList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Nozzle' } }
        count: { type: integer }

    Incident:
      type: object
      properties:
        id:                  { type: string, format: uuid }
        tenant_id:           { type: string, format: uuid }
        station_id:          { type: string, format: uuid }
        related_entity_type: { type: string }
        related_entity_id:   { type: string, format: uuid }
        type:                { type: string, enum: [equipment, leak, variance, safety, calibration, other] }
        severity:            { type: string, enum: [low, medium, high, critical] }
        description:         { type: string }
        status:              { type: string, enum: [open, investigating, resolved, closed] }
        opened_at:           { type: string, format: date-time }
        opened_by:           { type: string, format: uuid }
        resolved_at:         { type: string, format: date-time }
        resolved_by:         { type: string, format: uuid }
    IncidentCreate:
      type: object
      required: [station_id, description]
      properties:
        station_id:          { type: string, format: uuid }
        related_entity_type: { type: string }
        related_entity_id:   { type: string, format: uuid }
        type:                { type: string }
        severity:            { type: string }
        description:         { type: string }
    IncidentList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Incident' } }
        count: { type: integer }

    PumpWithNozzles:
      allOf:
        - $ref: '#/components/schemas/Pump'
        - type: object
          properties:
            nozzles: { type: array, items: { $ref: '#/components/schemas/Nozzle' } }
    StationOverview:
      type: object
      properties:
        station:        { $ref: '#/components/schemas/Station' }
        tanks:          { type: array, items: { $ref: '#/components/schemas/Tank' } }
        pumps:          { type: array, items: { $ref: '#/components/schemas/PumpWithNozzles' } }
        open_shifts:    { type: array, items: { $ref: '#/components/schemas/ShiftSummary' } }
        open_incidents: { type: array, items: { $ref: '#/components/schemas/Incident' } }

    OperatingDay:
      type: object
      properties:
        id:            { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        station_id:    { type: string, format: uuid }
        business_date: { type: string, format: date }
        status:        { type: string, enum: [open, closed, locked] }
        opened_by:     { type: string, format: uuid }
        opened_at:     { type: string, format: date-time }
        closed_by:     { type: string, format: uuid }
        closed_at:     { type: string, format: date-time }
        locked_by:     { type: string, format: uuid }
        locked_at:     { type: string, format: date-time }
        notes:         { type: string }
    OperatingDayList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/OperatingDay' } }
        count: { type: integer }

    Shift:
      type: object
      properties:
        id:               { type: string, format: uuid }
        tenant_id:        { type: string, format: uuid }
        station_id:       { type: string, format: uuid }
        operating_day_id: { type: string, format: uuid }
        name:             { type: string }
        status:           { type: string, enum: [open, closed, approved] }
        opened_by:        { type: string, format: uuid }
        opened_at:        { type: string, format: date-time }
        closed_by:        { type: string, format: uuid }
        closed_at:        { type: string, format: date-time }
        approved_by:      { type: string, format: uuid }
        approved_at:      { type: string, format: date-time }
        notes:            { type: string }
    ShiftList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Shift' } }
        count: { type: integer }
    ShiftAttendant:
      type: object
      properties:
        shift_id:    { type: string, format: uuid }
        user_id:     { type: string, format: uuid }
        assigned_by: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
    NozzleAssignment:
      type: object
      properties:
        id:           { type: string, format: uuid }
        shift_id:     { type: string, format: uuid }
        nozzle_id:    { type: string, format: uuid }
        attendant_id: { type: string, format: uuid }
        assigned_at:  { type: string, format: date-time }
    ShiftSummary:
      allOf:
        - $ref: '#/components/schemas/Shift'
        - type: object
          properties:
            attendants:         { type: array, items: { $ref: '#/components/schemas/ShiftAttendant' } }
            nozzle_assignments: { type: array, items: { $ref: '#/components/schemas/NozzleAssignment' } }
    ShiftDetail:
      allOf:
        - $ref: '#/components/schemas/ShiftSummary'

    MeterReading:
      type: object
      properties:
        id:            { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        shift_id:      { type: string, format: uuid }
        nozzle_id:     { type: string, format: uuid }
        reading_type:  { type: string, enum: [opening, closing] }
        reading:       { type: number }
        recorded_by:   { type: string, format: uuid }
        recorded_at:   { type: string, format: date-time }
        supersedes_id: { type: string, format: uuid }
        status:        { type: string, enum: [active, superseded] }
    MeterDispensed:
      type: object
      properties:
        nozzle_id:        { type: string, format: uuid }
        opening:          { type: number }
        closing:          { type: number }
        litres_dispensed: { type: number }
    MeterReadingList:
      type: object
      properties:
        items:     { type: array, items: { $ref: '#/components/schemas/MeterReading' } }
        count:     { type: integer }
        dispensed: { type: array, items: { $ref: '#/components/schemas/MeterDispensed' } }
    DipReading:
      type: object
      properties:
        id:            { type: string, format: uuid }
        tenant_id:     { type: string, format: uuid }
        shift_id:      { type: string, format: uuid }
        tank_id:       { type: string, format: uuid }
        reading_type:  { type: string, enum: [opening, closing] }
        dip_mm:        { type: number }
        volume_litres: { type: number }
        water_mm:      { type: number }
        temperature_c: { type: number }
        chart_id:      { type: string, format: uuid }
        recorded_by:   { type: string, format: uuid }
        recorded_at:   { type: string, format: date-time }
        supersedes_id: { type: string, format: uuid }
        status:        { type: string, enum: [active, superseded] }
    DipReadingList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/DipReading' } }
        count: { type: integer }

    ShiftCloseLine:
      type: object
      properties:
        nozzle_id:       { type: string, format: uuid }
        opening_reading: { type: number }
        closing_reading: { type: number }
        litres_sold:     { type: number }
        unit_price:      { type: number }
        expected_value:  { type: number }
    CashSubmission:
      type: object
      properties:
        id:                  { type: string, format: uuid }
        shift_id:            { type: string, format: uuid }
        expected_cash:       { type: number }
        cash_amount:         { type: number }
        mobile_money_amount: { type: number }
        card_amount:         { type: number }
        credit_amount:       { type: number }
        submitted_total:     { type: number }
        variance:            { type: number }
        submitted_by:        { type: string, format: uuid }
        submitted_at:        { type: string, format: date-time }
        notes:               { type: string }
    ShiftCloseSummary:
      type: object
      properties:
        shift:           { $ref: '#/components/schemas/Shift' }
        lines:           { type: array, items: { $ref: '#/components/schemas/ShiftCloseLine' } }
        expected_cash:   { type: number }
        cash_submission: { oneOf: [{ $ref: '#/components/schemas/CashSubmission' }, { type: 'null' }] }
    ShiftException:
      type: object
      properties:
        id:          { type: string, format: uuid }
        tenant_id:   { type: string, format: uuid }
        shift_id:    { type: string, format: uuid }
        type:        { type: string, enum: [missing_reading, cash_variance, meter_rollback, late_close, other] }
        severity:    { type: string }
        detail:      { type: string }
        status:      { type: string, enum: [open, resolved] }
        raised_at:   { type: string, format: date-time }
        resolved_by: { type: string, format: uuid }
        resolved_at: { type: string, format: date-time }
    ShiftExceptionList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ShiftException' } }
        count: { type: integer }

    MyShiftNozzle:
      type: object
      properties:
        nozzle_id:            { type: string, format: uuid }
        pump_number:          { type: integer }
        nozzle_number:        { type: integer }
        product_name:         { type: string }
        product_color:        { type: string }
        tank_id:              { type: string, format: uuid }
        tank_code:            { type: string }
        default_price:        { type: number }
        meter_decimal_places: { type: integer }
        opening_reading:      { type: number }
        closing_reading:      { type: number }
    MyShiftTank:
      type: object
      properties:
        tank_id:               { type: string, format: uuid }
        tank_code:             { type: string }
        product_color:         { type: string }
        opening_dip_mm:        { type: number }
        opening_volume_litres: { type: number }
        closing_dip_mm:        { type: number }
        closing_volume_litres: { type: number }
    MyShift:
      type: object
      properties:
        shift:            { oneOf: [{ $ref: '#/components/schemas/Shift' }, { type: 'null' }] }
        assigned_nozzles: { type: array, items: { $ref: '#/components/schemas/MyShiftNozzle' } }
        assigned_tanks:   { type: array, items: { $ref: '#/components/schemas/MyShiftTank' } }
        expected_cash:    { type: number }
        cash_submission:  { oneOf: [{ $ref: '#/components/schemas/CashSubmission' }, { type: 'null' }] }

    OperationsAttendant:
      type: object
      properties:
        user_id:   { type: string, format: uuid }
        full_name: { type: string }
        email:     { type: string, format: email }
    OperationsShift:
      allOf:
        - $ref: '#/components/schemas/Shift'
        - type: object
          properties:
            attendants:          { type: array, items: { $ref: '#/components/schemas/OperationsAttendant' } }
            nozzle_assignments:  { type: array, items: { $ref: '#/components/schemas/NozzleAssignment' } }
            expected_cash:       { type: number }
            litres_sold:         { type: number }
            cash_submission:     { oneOf: [{ $ref: '#/components/schemas/CashSubmission' }, { type: 'null' }] }
            exceptions:          { type: array, items: { $ref: '#/components/schemas/ShiftException' } }
            open_exception_count: { type: integer }
    OperationsOverview:
      type: object
      properties:
        station: { $ref: '#/components/schemas/Station' }
        day:     { oneOf: [{ $ref: '#/components/schemas/OperatingDay' }, { type: 'null' }] }
        shifts:  { type: array, items: { $ref: '#/components/schemas/OperationsShift' } }
